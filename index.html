<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESP – Rede Social Inteligente</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

    <style>
        :root { --primary: #065fd4; --bg: #f9f9f9; --text: #0f0f0f; --border: #e5e5e5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); }

        /* TELAS DE LOGIN E SETUP */
        #authOverlay, #setupOverlay { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        #setupOverlay { display: none; background: #f0f7ff; }
        .btn-google { background: white; border: 1px solid #ccc; padding: 15px 30px; border-radius: 30px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 10px; font-size: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .setup-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        .option-btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; background: none; font-weight: bold; transition: 0.2s; }
        .option-btn.selected { border-color: var(--primary); background: #eef4ff; color: var(--primary); }

        /* APP LAYOUT */
        header { height: 56px; background: white; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border); position: fixed; width: 100%; z-index: 100; }
        .sidebar { position: fixed; left: -260px; top: 0; width: 260px; height: 100%; background: white; transition: 0.3s; z-index: 101; padding: 80px 20px; border-right: 1px solid var(--border); }
        .sidebar.active { left: 0; }
        .module-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 8px; background: #f2f2f2; font-weight: 500; }
        
        main { padding: 80px 20px; max-width: 1000px; margin: 0 auto; }
        
        /* SISTEMA DE CHAT */
        .chat-container { display: flex; flex-direction: column; height: 60vh; background: white; border-radius: 15px; border: 1px solid var(--border); overflow: hidden; }
        .chat-messages { flex-grow: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 15px; max-width: 70%; font-size: 14px; }
        .msg.sent { align-self: flex-end; background: var(--primary); color: white; }
        .msg.received { align-self: flex-start; background: #eee; }
        .chat-input { display: flex; border-top: 1px solid var(--border); padding: 10px; }
        .chat-input input { flex-grow: 1; padding: 10px; border: none; outline: none; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <h1 style="font-size: 40px; margin-bottom: 10px;">RESP</h1>
        <p style="margin-bottom: 30px; color: gray;">Sua rede, suas regras.</p>
        <button class="btn-google" onclick="signIn()">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_HiRes_Logo.png" width="20" alt="">
            Entrar com Google
        </button>
    </div>

    <div id="setupOverlay">
        <div class="setup-card">
            <h2>Bem-vindo!</h2>
            <p style="margin: 15px 0;">O que você mais gosta de fazer?</p>
            <button class="option-btn" onclick="toggleOption(this, 'Vídeos')">📺 Ver Vídeos</button>
            <button class="option-btn" onclick="toggleOption(this, 'Chat')">💬 Conversar com Amigos</button>
            <button class="option-btn" onclick="toggleOption(this, 'Jogos')">🎮 Jogar Online</button>
            <button class="btn-google" style="background: var(--primary); color: white; margin-top: 20px; width: 100%; justify-content: center;" onclick="saveSetup()">Começar a Usar</button>
        </div>
    </div>

    <header>
        <button onclick="toggleSidebar()" style="background:none; border:none; font-size:24px; cursor:pointer;">☰</button>
        <h3 id="userDisplay" style="margin-left:15px;">RESP</h3>
    </header>

    <aside class="sidebar" id="sidebar">
        <ul id="moduleList"></ul>
        <button onclick="signOut()" style="margin-top:2
