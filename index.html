<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESP – Sistema de Sincronização</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

    <style>
        :root { --primary: #065fd4; --bg: #f9f9f9; --danger: #cc0000; --border: #e5e5e5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); overflow-x: hidden; }

        /* TELAS DE BLOQUEIO */
        #authOverlay, #setupOverlay, #settingsModal { position: fixed; inset: 0; background: white; z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        #setupOverlay, #settingsModal { display: none; background: rgba(255,255,255,0.98); }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        
        /* HEADER E SIDEBAR */
        header { height: 56px; background: white; display: flex; align-items: center; padding: 0 16px; border-bottom: 1px solid var(--border); position: fixed; width: 100%; z-index: 100; justify-content: space-between; }
        .sidebar { position: fixed; left: -260px; top: 0; width: 260px; height: 100%; background: white; transition: 0.3s; z-index: 101; padding: 80px 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        
        /* ÁREA DE DROP (IMPORTANTE) */
        #moduleList { flex-grow: 1; min-height: 200px; border: 2px dashed transparent; border-radius: 15px; padding: 10px; transition: 0.3s; }
        #moduleList.drag-over { border-color: var(--primary); background: #f0f7ff; }

        .module-item { padding: 15px; border-radius: 12px; cursor: pointer; margin-bottom: 8px; background: #f2f2f2; font-weight: 600; list-style: none; text-align: center; }

        /* BARRA DE ARRASTAR (PRETA) */
        #dragPanel { position: fixed; bottom: 0; width: 100%; background: #000; color: white; padding: 20px; display: none; gap: 15px; justify-content: center; z-index: 2000; align-items: center; }
        .drag-box { padding: 10px 20px; background: #333; border-radius: 8px; cursor: grab; font-weight: bold; border: 1px solid #444; }

        /* BOTÕES */
        .btn { padding: 12px 25px; border-radius: 25px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        /* VÍDEOS */
        main { padding: 80px 20px; max-width: 1100px; margin: 0 auto; }
        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .video-card { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; }
        .thumb video { width: 100%; aspect-ratio: 16/9; background: #000; object-fit: cover; }
    </style>
</head>
<body>

    <div id="authOverlay">
        <h1>RESP</h1>
        <button class="btn btn-primary" style="max-width:250px" onclick="signIn()">Entrar com Google</button>
    </div>

    <div id="setupOverlay">
        <div class="card">
            <h2>Quase pronto!</h2>
            <input type="text" id="userNick" placeholder="Seu Nickname" style="width:100%; padding:12px; margin:15px 0; border-radius:10px; border:1px solid #ddd;">
            <button class="btn btn-primary" onclick="finishSetup()">Criar Perfil</button>
        </div>
    </div>

    <div id="settingsModal">
        <div class="card">
            <h3>Configurações ⚙️</h3>
            <button class="btn btn-primary" onclick="showDragPanel()">Personalizar Barra Lateral</button>
            <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px;">
                <button class="btn btn-danger" onclick="signOut()">Sair da Conta</button>
                <button class="btn" style="color:red; background:none;" onclick="deleteAccount()">Excluir Conta</button>
            </div>
            <button class="btn" onclick="closeSettings()" style="background:#eee">Fechar</button>
        </div>
    </div>

    <header>
        <button onclick="toggleSidebar()" style="background:none; border:none; font-size:24px; cursor:pointer;">☰</button>
        <h3 id="topNick">RESP</h3>
        <button onclick="openSettings()" style="background:none; border:none; font-size:20px;">⚙️</button>
    </header>

    <aside class="sidebar" id="sidebar">
        <p style="font-size: 11px; color: gray; margin-bottom: 10px;">SEU MENU</p>
        <ul id="moduleList"></ul>
    </aside>

    <main>
        <div id="videoSection" style="display:none;">
            <h1>Vídeos Global</h1>
            <div class="video-grid" id="videoGrid"></div>
        </div>
        <div id="defaultSection">
            <h1 id="viewTitle">Início</h1>
            <p>Seja bem-vindo, <span id="welcomeNick"></span>!</p>
        </div>
    </main>

    <div id="dragPanel">
        <span style="font-size: 13px;">Arraste para a esquerda:</span>
        <div class="drag-box" draggable="true" ondragstart="drag(event)">Vídeos</div>
        <div class="drag-box" draggable="true" ondragstart="drag(event)">Chat</div>
        <div class="drag-box" draggable="true" ondragstart="drag(event)">Loja</div>
        <button onclick="hideDragPanel()" style="background: white; border: none; padding: 5px 15px; border-radius: 15px; font-weight: bold; cursor: pointer;">Pronto</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAvZl2jk8i8n0e9844cxw6mGdCWXB6CZ_w",
            authDomain: "resp-f1.firebaseapp.com",
            projectId: "resp-f1",
            storageBucket: "resp-f1.firebasestorage.app",
            messagingSenderId: "616016136217",
            appId: "1:616016136217:web:ec3642b797375ce0134288"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let userData = { nick: '', modules: ['Início'] };

        // --- AUTH ---
        async function signIn() {
            const provider = new firebase.auth.GoogleAuthProvider();
            await auth.signInWithPopup(provider);
        }

        function signOut() { auth.signOut().then(() => location.reload()); }

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('authOverlay').style.display = 'none';
                const doc = await db.collection("users").doc(user.uid).get();
                if (doc.exists()) {
                    userData = doc.data();
                    loadUI();
                } else {
                    document.getElementById('setupOverlay').style.display = 'flex';
                }
            } else {
                document.getElementById('authOverlay').style.display = 'flex';
            }
        });

        // --- SETUP ---
        async function finishSetup() {
            const nick = document.getElementById('userNick').value;
            if(!nick) return alert("Escolha um nick!");
            userData = { nick: nick, modules: ['Início'] };
            await db.collection("users").doc(auth.currentUser.uid).set(userData);
            document.getElementById('setupOverlay').style.display = 'none';
            loadUI();
        }

        // --- UI & SYNC ---
        function loadUI() {
            document.getElementById('topNick').innerText = userData.nick;
            document.getElementById('welcomeNick').innerText = userData.nick;
            const list = document.getElementById('moduleList');
            list.innerHTML = "";
            userData.modules.forEach(m => {
                const li = document.createElement('li');
                li.className = "module-item";
                li.innerText = m;
                li.onclick = () => { 
                    document.getElementById('viewTitle').innerText = m;
                    document.getElementById('videoSection').style.display = (m === 'Vídeos') ? 'block' : 'none';
                    document.getElementById('defaultSection').style.display = (m === 'Vídeos') ? 'none' : 'block';
                    if(m === 'Vídeos') loadVideos();
                };
                list.appendChild(li);
            });
        }

        // --- DRAG AND DROP (CORRIGIDO) ---
        function drag(e) { e.dataTransfer.setData("text", e.target.innerText); }
        
        const moduleListArea = document.getElementById('moduleList');

        moduleListArea.ondragover = (e) => {
            e.preventDefault();
            moduleListArea.classList.add('drag-over');
        };

        moduleListArea.ondragleave = () => {
            moduleListArea.classList.remove('drag-over');
        };

        moduleListArea.ondrop = async (e) => {
            e.preventDefault();
            moduleListArea.classList.remove('drag-over');
            const modName = e.dataTransfer.getData("text");
            
            if (modName && !userData.modules.includes(modName)) {
                userData.modules.push(modName);
                // Salva na nuvem na hora!
                await db.collection("users").doc(auth.currentUser.uid).update({
                    modules: userData.modules
                });
                loadUI();
            }
        };

        // --- CONFIGS ---
        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
        function showDragPanel() { 
            closeSettings();
            document.getElementById('dragPanel').style.display = 'flex';
            if(window.innerWidth < 768) toggleSidebar(); 
            // Abre a sidebar automaticamente para ajudar o arraste
            document.getElementById('sidebar').classList.add('active');
        }
        function hideDragPanel() { document.getElementById('dragPanel').style.display = 'none'; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        async function loadVideos() {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = "Carregando feed...";
            const snap = await db.collection("videos").orderBy("time", "desc").limit(10).get();
            grid.innerHTML = "";
            snap.forEach(doc => {
                const v = doc.data();
                grid.innerHTML += `<div class="video-card"><div class="thumb"><video src="${v.url}#t=0.1" controls></video></div><div style="padding:10px"><b>${v.title}</b></div></div>`;
            });
        }
    </script>
</body>
</html>
