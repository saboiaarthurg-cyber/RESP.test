<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RESP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* MENU */
#menuBtn {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 26px;
  cursor: pointer;
  z-index: 1000;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  left: -260px;
  top: 0;
  width: 260px;
  height: 100%;
  background: #111;
  color: white;
  transition: 0.3s;
  padding: 20px;
}

#sidebar.active {
  left: 0;
}

#closeBtn {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
}

/* BOTÃO ☰☰ (SÓ EXISTE COM SIDEBAR ABERTA) */
#openModules {
  position: absolute;
  bottom: 20px;
  left: 20px;
  font-size: 20px;
  cursor: pointer;
  display: none;
}

#sidebar.active #openModules {
  display: block;
}

/* MÓDULOS */
.module {
  background: #333;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  cursor: pointer;
}

/* CONTEÚDO */
#main {
  padding: 80px 20px 100px;
}

.screen {
  display: none;
}

.screen.active {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
}

.card {
  height: 120px;
  background: #ddd;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ABA DE BAIXO */
#bottomPanel {
  position: fixed;
  left: 0;
  right: 0;
  bottom: -160px;
  height: 160px;
  background: #222;
  color: white;
  padding: 20px;
  display: flex;
  gap: 10px;
  transition: 0.3s;
}

#bottomPanel.active {
  bottom: 0;
}

.bottom-item {
  background: #444;
  padding: 10px;
  border-radius: 8px;
  cursor: grab;
}
</style>
</head>

<body>

<div id="menuBtn">☰</div>

<div id="sidebar">
  <div id="closeBtn">✖</div>

  <h3>RESP</h3>

  <div id="modulesList">
    <div class="module" onclick="openScreen('home')">Início</div>
  </div>

  <!-- BOTÃO QUE SÓ APARECE COM SIDEBAR -->
  <div id="openModules">☰☰</div>
</div>

<div id="main">
  <div id="home" class="screen active">
    <div class="card">Produto</div>
    <div class="card">Vídeo</div>
    <div class="card">Post</div>
  </div>

  <div id="Vídeos" class="screen"></div>
  <div id="Chat" class="screen"></div>
</div>

<div id="bottomPanel">
  <div class="bottom-item" draggable="true">Vídeos</div>
  <div class="bottom-item" draggable="true">Chat</div>
  <div class="bottom-item" draggable="true">Feed</div>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const panel = document.getElementById("bottomPanel");
const modulesList = document.getElementById("modulesList");

menuBtn.onclick = () => {
  sidebar.classList.toggle("active");

  // FECHA A ABA DE BAIXO se fechar sidebar
  if (!sidebar.classList.contains("active")) {
    panel.classList.remove("active");
  }
};

closeBtn.onclick = () => {
  sidebar.classList.remove("active");
  panel.classList.remove("active");
};

// ABRIR ABA DE BAIXO
openModules.onclick = () => {
  panel.classList.toggle("active");
};

// DRAG
document.querySelectorAll('.bottom-item').forEach(item => {
  item.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text', item.innerText);
  });
});

// DROP
sidebar.addEventListener('dragover', e => e.preventDefault());

sidebar.addEventListener('drop', e => {
  const data = e.dataTransfer.getData('text');

  if ([...modulesList.children].some(el => el.innerText === data)) return;

  const newModule = document.createElement('div');
  newModule.className = 'module';
  newModule.innerText = data;
  newModule.onclick = () => openScreen(data);

  modulesList.appendChild(newModule);
});

// TROCAR TELA
function openScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

  const screen = document.getElementById(name);
  if (screen) {
    screen.classList.add('active');
  }

  sidebar.classList.remove("active");
  panel.classList.remove("active");
}
</script>

</body>
</html>
