<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESP – Rede Social Personalizável</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --sidebar-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
            --accent: #f1f5f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        /* --- HEADER --- */
        header {
            height: 60px;
            background: white;
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border);
            position: fixed;
            width: 100%;
            z-index: 100;
        }

        .menu-toggle {
            font-size: 24px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            position: fixed;
            left: -260px;
            top: 0;
            width: 260px;
            height: 100%;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            transition: 0.3s ease;
            z-index: 101; /* Camada alta */
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }

        .sidebar.active { left: 0; }

        .sidebar h2 { margin-bottom: 30px; color: var(--primary); letter-spacing: 2px; }

        .module-list { 
            flex-grow: 1; 
            list-style: none; 
            min-height: 100px; /* Área de drop garantida */
            padding: 10px 0;
        }

        .module-list.drag-over {
            background: rgba(99, 102, 241, 0.05);
            border: 2px dashed var(--primary);
            border-radius: 8px;
        }

        .module-item {
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            background: var(--accent);
            border: 1px solid transparent;
            font-weight: 500;
        }

        .module-item:hover { background: #e0e7ff; color: var(--primary); }

        .config-btn {
            background: var(--text);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            text-align: center;
            z-index: 102;
        }

        /* --- BOTTOM PANEL --- */
        .bottom-panel {
            position: fixed;
            bottom: 20px;
            left: 280px;
            right: 20px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
            z-index: 1000; /* Garante que fique acima de tudo ao arrastar */
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .panel-grid { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; }

        .draggable-item {
            padding: 15px 25px;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            cursor: grab;
            white-space: nowrap;
            user-select: none;
            transition: transform 0.2s;
        }

        .draggable-item:active { cursor: grabbing; transform: scale(0.95); }

        /* --- MAIN CONTENT --- */
        main {
            padding: 80px 20px 20px 20px;
            transition: 0.3s;
            max-width: 1200px;
            margin: 0 auto;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .card-tag { font-size: 12px; color: var(--primary); font-weight: bold; margin-bottom: 10px; }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.2);
            display: none;
            z-index: 100;
        }

        .overlay.active { display: block; }

        .suggestion-box {
            margin-top: 20px;
            padding: 15px;
            background: #f0fdf4;
            border-radius: 8px;
            border: 1px solid #bbf7d0;
        }
        .suggestion-box h4 { font-size: 14px; margin-bottom: 5px; color: #166534; }
        .suggestion-box p { font-size: 12px; color: #15803d; }

    </style>
</head>
<body>

    <header>
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h3 style="margin-left: 20px;">RESP</h3>
    </header>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <h2>RESP</h2>
        <ul class="module-list" id="moduleList">
            <li class="module-item" onclick="changeContent('Início')">Início</li>
        </ul>

        <div class="suggestion-box">
            <h4>Redes sugeridas</h4>
            <p>Tente: "Fitness Pro" ou "Art Gallery"</p>
        </div>

        <button class="config-btn" id="configBtn" onclick="toggleBottomPanel()" style="margin-top: 20px;">☰☰</button>
    </aside>

    <main id="mainContent">
        <h1 id="pageTitle" style="margin-bottom: 20px;">Início</h1>
        <div class="content-grid" id="grid"></div>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const moduleList = document.getElementById('moduleList');
        const grid = document.getElementById('grid');
        const pageTitle = document.getElementById('pageTitle');
        
        let bottomPanel = null;
        const activeModules = new Set(['Início']);

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            overlay.classList.toggle('active');
            if (!sidebar.classList.contains('active')) {
                removeBottomPanel();
            }
        }

        function toggleBottomPanel() {
            if (bottomPanel) {
                removeBottomPanel();
            } else {
                createBottomPanel();
            }
        }

        function createBottomPanel() {
            if (document.getElementById('bottomPanel')) return;

            bottomPanel = document.createElement('div');
            bottomPanel.className = 'bottom-panel';
            bottomPanel.id = 'bottomPanel';
            bottomPanel.innerHTML = `
                <p style="margin-bottom:10px; font-weight:bold">Arraste para a barra lateral:</p>
                <div class="panel-grid">
                    <div class="draggable-item" draggable="true">Vídeos</div>
                    <div class="draggable-item" draggable="true">Chat</div>
                    <div class="draggable-item" draggable="true">Feed</div>
                    <div class="draggable-item" draggable="true">Loja</div>
                    <div class="draggable-item" draggable="true">Comunidade</div>
                </div>
            `;
            document.body.appendChild(bottomPanel);

            // Adicionar eventos aos novos itens criados
            const items = bottomPanel.querySelectorAll('.draggable-item');
            items.forEach(item => {
                item.addEventListener('dragstart', handleDragStart);
                item.addEventListener('dragend', handleDragEnd);
            });
        }

        function removeBottomPanel() {
            if (bottomPanel) {
                bottomPanel.remove();
                bottomPanel = null;
            }
        }

        // --- Lógica de Drag and Drop Corrigida ---

        function handleDragStart(e) {
            e.dataTransfer.setData('text/plain', e.target.innerText);
            e.dataTransfer.effectAllowed = "move";
            e.target.style.opacity = "0.4";
        }

        function handleDragEnd(e) {
            e.target.style.opacity = "1";
            moduleList.classList.remove('drag-over');
        }

        // Eventos na lista (Dropzone)
        moduleList.addEventListener('dragover', (e) => {
            e.preventDefault(); // Necessário para permitir o drop
            e.dataTransfer.dropEffect = "move";
            moduleList.classList.add('drag-over');
        });

        moduleList.addEventListener('dragleave', () => {
            moduleList.classList.remove('drag-over');
        });

        moduleList.addEventListener('drop', (e) => {
            e.preventDefault();
            moduleList.classList.remove('drag-over');
            const moduleName = e.dataTransfer.getData('text/plain');

            if (moduleName && !activeModules.has(moduleName)) {
                activeModules.add(moduleName);
                
                const li = document.createElement('li');
                li.className = 'module-item';
                li.innerText = moduleName;
                li.onclick = () => changeContent(moduleName);
                moduleList.appendChild(li);
                
                changeContent(moduleName);
            }
        });

        // --- UI Logic ---

        function changeContent(name) {
            pageTitle.innerText = name;
            grid.innerHTML = ''; 

            for (let i = 1; i <= 6; i++) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="card-tag">${name.toUpperCase()}</span>
                    <h3>Conteúdo de ${name} #${i}</h3>
                    <p style="color: #64748b; margin-top: 10px;">Simulação de publicação ou item modular para a seção ${name}.</p>
                `;
                grid.appendChild(card);
            }
            
            if(window.innerWidth < 768) toggleSidebar();
        }

        changeContent('Início');

    </script>
</body>
</html>
