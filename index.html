<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RESP</title>
<style>
body { margin:0; font-family:Arial; }

#menuBtn {
  position:fixed; top:15px; left:15px;
  font-size:26px; cursor:pointer;
}

#sidebar {
  position:fixed;
  left:-260px; top:0;
  width:260px; height:100%;
  background:#111; color:white;
  padding:20px;
  transition:0.3s;
}

#sidebar.active { left:0; }

#openModules {
  position:absolute;
  bottom:20px; left:20px;
  display:none;
  cursor:pointer;
}

#sidebar.active #openModules {
  display:block;
}

.card {
  margin-top:100px;
  height:120px;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<div id="menuBtn">☰</div>

<div id="sidebar">
  <h3>RESP</h3>
  <div id="openModules">☰☰</div>
</div>

<div class="card">TESTE</div>

<script>
let panel = null;

menuBtn.onclick = () => {
  sidebar.classList.toggle("active");

  if (!sidebar.classList.contains("active") && panel) {
    panel.remove();
    panel = null;
  }
};

openModules.onclick = () => {
  if (panel) return;

  panel = document.createElement("div");
  panel.style = `
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:150px;
    background:#222;
    color:white;
    padding:20px;
  `;
  panel.innerHTML = "PAINEL FUNCIONANDO";

  document.body.appendChild(panel);
};
</script>

</body>
</html>
