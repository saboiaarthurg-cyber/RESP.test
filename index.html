<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resp — Rede Social</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
    <!-- SortableJS para Drag & Drop -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500&amp;display=swap');
        
        :root {
            --tw-color-primary: #065fd4;
        }
        
        .tailwind-ready * {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .sidebar-module {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="tailwind-ready bg-gray-950 text-gray-100 dark">
    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#065fd4] to-gray-900 hidden">
        <div class="max-w-md w-full mx-4 bg-white/10 backdrop-blur-xl rounded-3xl p-8 shadow-2xl border border-white/20">
            <div class="text-center mb-8">
                <div class="inline-flex items-center gap-2 text-4xl font-bold logo-font tracking-tighter text-white">
                    <span class="text-[#065fd4]">R</span>esp
                </div>
                <p class="text-white/70 mt-2">Sua rede social de vídeos</p>
            </div>

            <button onclick="handleGoogleLogin()" 
                    class="w-full flex items-center justify-center gap-3 bg-white text-gray-900 hover:bg-gray-100 py-4 rounded-2xl font-semibold text-lg transition-all mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.42 0 24 0 14.62 0 6.52 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.42-4.55H24v9.1h12.94c-.56 2.83-2.18 5.22-4.6 6.82l7.4 5.74c4.3-3.96 6.74-9.78 6.74-16.11z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-1.1-3.27-1.1-6.82 0-10.09l-7.98-6.19C-.9 18.5-.9 29.5 2.55 39.78l7.98-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.42 0 11.93-2.12 15.9-5.74l-7.4-5.74c-2.05 1.38-4.67 2.2-7.9 2.2-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.52 42.62 14.62 48 24 48z"/>
                </svg>
                Entrar com Google
            </button>

            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-white/30"></div>
                <span class="text-white/50 text-sm font-medium">OU</span>
                <div class="flex-1 h-px bg-white/30"></div>
            </div>

            <div id="email-form">
                <input id="email-input" type="email" placeholder="Seu e-mail" class="w-full bg-white/10 border border-white/30 focus:border-[#065fd4] rounded-2xl px-5 py-4 mb-3 text-white placeholder:text-white/50">
                <input id="password-input" type="password" placeholder="Sua senha" class="w-full bg-white/10 border border-white/30 focus:border-[#065fd4] rounded-2xl px-5 py-4 mb-3 text-white placeholder:text-white/50">
                <div class="flex justify-between text-sm mb-6">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="accent-[#065fd4]">
                        <span class="text-white/70">Lembrar de mim</span>
                    </label>
                    <a href="#" onclick="showRegister()" class="text-[#065fd4] hover:underline">Criar conta</a>
                </div>
                <button onclick="handleEmailLogin()" class="w-full bg-[#065fd4] hover:bg-[#054aa8] py-4 rounded-2xl font-semibold text-lg transition-all">
                    Entrar com E-mail
                </button>
            </div>

            <div id="register-form" class="hidden">
                <input id="register-email" type="email" placeholder="E-mail" class="w-full bg-white/10 border border-white/30 focus:border-[#065fd4] rounded-2xl px-5 py-4 mb-3 text-white placeholder:text-white/50">
                <input id="register-password" type="password" placeholder="Senha (mín. 6 caracteres)" class="w-full bg-white/10 border border-white/30 focus:border-[#065fd4] rounded-2xl px-5 py-4 mb-6 text-white placeholder:text-white/50">
                <button onclick="handleEmailRegister()" class="w-full bg-[#065fd4] hover:bg-[#054aa8] py-4 rounded-2xl font-semibold text-lg transition-all">
                    Criar conta
                </button>
                <button onclick="hideRegister()" class="w-full mt-3 text-white/70 hover:text-white">Voltar</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden min-h-screen flex">
        
        <!-- SIDEBAR – Começa SOMENTE com Início -->
        <div id="sidebar" class="w-72 bg-gray-900 border-r border-white/10 flex flex-col transition-all duration-300">
            
            <div class="px-6 pt-6 pb-4 flex items-center justify-between border-b border-white/10">
                <div class="flex items-center gap-2 text-3xl font-bold logo-font tracking-tighter">
                    <span class="text-[#065fd4]">R</span>esp
                </div>
                <button onclick="toggleDarkMode()" class="p-2 hover:bg-white/10 rounded-xl">
                    <span id="dark-mode-icon" class="text-2xl">☀️</span>
                </button>
            </div>

            <!-- Lista de módulos (inicia vazia, só com Início) -->
            <div class="flex-1 px-3 py-6 overflow-y-auto" id="sidebar-modules">
                <div id="modules-list" class="space-y-1">
                    <!-- Só o "Início" é carregado por padrão -->
                </div>
            </div>

            <!-- Botão para adicionar módulos -->
            <div class="px-6 pb-6">
                <button onclick="showAddModuleModal()" 
                        class="w-full flex items-center justify-center gap-2 bg-white/10 hover:bg-white/20 text-white py-3 rounded-2xl font-medium">
                    <span class="text-2xl leading-none">+</span>
                    <span>Adicionar módulo</span>
                </button>
            </div>

            <!-- Perfil -->
            <div onclick="showProfileMenu()" class="px-6 py-4 border-t border-white/10 flex items-center gap-3 cursor-pointer hover:bg-white/10">
                <img id="sidebar-avatar" src="https://picsum.photos/id/64/40/40" alt="" class="w-9 h-9 rounded-2xl object-cover">
                <div class="flex-1 min-w-0">
                    <p id="sidebar-name" class="font-semibold truncate">Carregando...</p>
                    <p id="sidebar-nickname" class="text-xs text-white/50 truncate">@...</p>
                </div>
                <span class="text-2xl">▼</span>
            </div>
        </div>

        <!-- MOBILE HAMBURGER -->
        <div onclick="toggleMobileSidebar()" class="lg:hidden fixed top-4 left-4 z-50 bg-[#065fd4] text-white w-10 h-10 flex items-center justify-center rounded-2xl shadow-xl">
            <span id="hamburger-icon" class="text-3xl">☰</span>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="flex-1 flex flex-col min-h-screen">
            <div class="h-16 bg-white/5 backdrop-blur-lg border-b border-white/10 px-6 flex items-center justify-between sticky top-0 z-40">
                <div class="flex-1 max-w-xl">
                    <div class="bg-white/10 hover:bg-white/20 flex items-center gap-3 px-5 h-11 rounded-3xl text-white/70 cursor-text">
                        <span class="text-xl">🔎</span>
                        <input id="search-input" type="text" placeholder="Buscar vídeos ou @nicknames" class="flex-1 bg-transparent outline-none text-sm placeholder:text-white/40">
                    </div>
                </div>

                <div class="flex items-center gap-5">
                    <div onclick="showNotifications()" class="relative cursor-pointer">
                        <span class="text-3xl">🛎️</span>
                        <span id="notification-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
                    </div>
                    <button onclick="showUploadModal()" class="flex items-center gap-2 bg-[#065fd4] hover:bg-[#054aa8] px-6 h-10 rounded-3xl font-semibold text-sm">
                        <span class="text-xl leading-none">+</span>
                        <span>Upload</span>
                    </button>
                    <div onclick="showProfileMenu()" class="flex items-center gap-2 cursor-pointer">
                        <img id="topbar-avatar" src="https://picsum.photos/id/64/32/32" alt="" class="w-8 h-8 rounded-2xl ring-2 ring-[#065fd4]/30">
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-auto p-6" id="main-content">
                <!-- Conteúdo dinâmico -->
            </div>
        </div>
    </div>

    <!-- MODAIS -->
    <!-- Upload -->
    <div id="upload-modal" onclick="if(event.target.id==='upload-modal')hideUploadModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
        <div onclick="event.stopImmediatePropagation()" class="bg-gray-900 rounded-3xl max-w-lg w-full mx-4 p-8">
            <h2 class="text-2xl font-semibold mb-6">Enviar vídeo</h2>
            <div id="upload-dropzone" class="border-2 border-dashed border-white/30 hover:border-[#065fd4] rounded-3xl h-64 flex flex-col items-center justify-center cursor-pointer transition-colors" onclick="document.getElementById('video-file-input').click()">
                <input type="file" id="video-file-input" accept="video/mp4" class="hidden" onchange="handleVideoSelect(event)">
                <div class="text-6xl mb-4">📤</div>
                <p class="font-medium">Arraste ou clique para selecionar MP4</p>
                <p id="file-name" class="text-xs text-white/50 mt-2"></p>
            </div>
            <div id="upload-progress-container" class="hidden mt-6">
                <div class="flex justify-between text-xs mb-2"><span id="progress-text">Enviando...</span><span id="progress-percent">0%</span></div>
                <div class="h-2 bg-white/10 rounded-3xl overflow-hidden"><div id="progress-bar" class="h-2 bg-[#065fd4] w-0 transition-all"></div></div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="hideUploadModal()" class="flex-1 py-4 text-white/70">Cancelar</button>
                <button onclick="startVideoUpload()" id="upload-confirm-btn" class="flex-1 py-4 bg-[#065fd4] rounded-2xl font-semibold disabled:opacity-50">Enviar agora</button>
            </div>
        </div>
    </div>

    <!-- Nickname -->
    <div id="nickname-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[10000]">
        <div class="bg-white/10 backdrop-blur-2xl rounded-3xl p-8 max-w-sm w-full mx-4">
            <h3 class="text-2xl font-semibold mb-2">Escolha seu @nickname</h3>
            <p class="text-white/60 mb-6">Único e obrigatório</p>
            <div class="relative">
                <span class="absolute left-5 top-4 text-white/40">@</span>
                <input id="nickname-input" type="text" maxlength="20" class="w-full bg-white/10 border border-white/30 focus:border-[#065fd4] rounded-2xl pl-9 py-4 text-xl">
            </div>
            <p id="nickname-error" class="text-red-400 text-sm mt-2 hidden"></p>
            <button onclick="saveNickname()" class="mt-8 w-full bg-[#065fd4] py-5 rounded-2xl font-semibold text-lg">Confirmar</button>
        </div>
    </div>

    <!-- Notificações -->
    <div id="notifications-modal" onclick="if(event.target.id==='notifications-modal')hideNotifications()" class="hidden fixed inset-0 bg-black/60 z-[9999] flex items-start justify-end pt-16 pr-6">
        <div class="bg-gray-900 w-full max-w-sm rounded-3xl shadow-2xl overflow-hidden">
            <div class="p-5 border-b border-white/10 flex justify-between">
                <h3 class="font-semibold">Notificações</h3>
                <span onclick="hideNotifications()" class="cursor-pointer text-2xl">✕</span>
            </div>
            <div id="notifications-list" class="max-h-96 overflow-auto p-2"></div>
        </div>
    </div>

    <!-- Adicionar Módulo -->
    <div id="add-module-modal" onclick="if(event.target.id==='add-module-modal')hideAddModuleModal()" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
        <div class="bg-gray-900 rounded-3xl p-6 max-w-xs w-full">
            <h3 class="text-lg font-semibold mb-4">Adicionar ao sidebar</h3>
            <div id="available-modules" class="grid grid-cols-2 gap-3"></div>
        </div>
    </div>

    <!-- Menu Perfil -->
    <div onclick="if(event.target.id==='profile-menu')hideProfileMenu()" id="profile-menu" class="hidden fixed top-16 right-8 bg-gray-900 rounded-3xl shadow-2xl py-2 w-64 z-[10000] border border-white/10">
        <div class="px-4 py-3 border-b border-white/10 flex items-center gap-3">
            <img id="menu-avatar" src="https://picsum.photos/id/64/48/48" class="w-12 h-12 rounded-2xl">
            <div>
                <p id="menu-name" class="font-semibold"></p>
                <p id="menu-nickname" class="text-xs text-white/50"></p>
            </div>
        </div>
        <a onclick="logout()" class="flex items-center gap-3 px-6 py-4 hover:bg-white/10 text-red-400 cursor-pointer">
            <span class="text-xl">🚪</span>
            <span>Sair</span>
        </a>
    </div>

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAvZl2jk8i8n0e9844cxw6mGdCWXB6CZ_w",
            authDomain: "resp-f1.firebaseapp.com",
            projectId: "resp-f1",
            storageBucket: "resp-f1.firebasestorage.app",
            messagingSenderId: "616016136217",
            appId: "1:616016136217:web:ec3642b797375ce0134288"
        };

        let app, auth, db, storage;
        function initializeFirebase() {
            if (!app) {
                app = firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
                storage = firebase.storage();
            }
        }

        let currentUser = null;
        let currentNickname = null;
        let currentPage = 'feed';
        
        // ← AQUI É O PONTO IMPORTANTE: Começamos SOMENTE com o módulo Início
        let modulesOrder = ['feed'];

        const defaultModules = {
            feed: { icon: '🏠', label: 'Início' },
            explore: { icon: '🔎', label: 'Explorar' },
            'chat-global': { icon: '🌍', label: 'Chat Global' },
            dm: { icon: '💬', label: 'Mensagens' },
            store: { icon: '🛒', label: 'Loja' }
        };

        // ==================== DARK MODE ====================
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.contains('dark');
            document.documentElement.classList.toggle('dark', !isDark);
            document.getElementById('dark-mode-icon').innerHTML = isDark ? '☀️' : '🌙';
        }

        // ==================== AUTENTICAÇÃO ====================
        async function handleGoogleLogin() {
            initializeFirebase();
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                await handleFirstLogin(result.user);
            } catch (e) { alert("Erro Google: " + e.message); }
        }

        async function handleEmailLogin() {
            initializeFirebase();
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value;
            if (!email || !password) return alert("Preencha todos os campos");
            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                await handleFirstLogin(result.user);
            } catch (e) { alert("Erro login: " + e.message); }
        }

        async function handleEmailRegister() {
            initializeFirebase();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            if (!email || password.length < 6) return alert("Senha mínima de 6 caracteres");
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await handleFirstLogin(result.user);
            } catch (e) { alert("Erro cadastro: " + e.message); }
        }

        async function handleFirstLogin(user) {
            currentUser = user;
            const doc = await db.collection('users').doc(user.uid).get();
            if (!doc.exists) {
                document.getElementById('nickname-modal').classList.remove('hidden');
                return;
            }
            currentNickname = doc.data().nickname;
            finishLogin();
        }

        async function saveNickname() {
            const nickname = document.getElementById('nickname-input').value.trim().toLowerCase();
            if (!nickname || !/^[a-z0-9_]{3,20}$/.test(nickname)) {
                showNicknameError("Use apenas letras minúsculas, números e _ (3-20 caracteres)");
                return;
            }
            const snapshot = await db.collection('users').where('nickname', '==', nickname).get();
            if (!snapshot.empty) {
                showNicknameError("Esse nickname já está em uso");
                return;
            }
            await db.collection('users').doc(currentUser.uid).set({
                uid: currentUser.uid,
                email: currentUser.email,
                nickname: nickname,
                displayName: currentUser.displayName || nickname,
                photoURL: currentUser.photoURL || `https://picsum.photos/id/${Math.floor(Math.random()*100)}/128/128`,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            currentNickname = nickname;
            document.getElementById('nickname-modal').classList.add('hidden');
            finishLogin();
        }

        function showNicknameError(msg) {
            const el = document.getElementById('nickname-error');
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3500);
        }

        function finishLogin() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            document.getElementById('sidebar-name').textContent = currentUser.displayName || currentNickname;
            document.getElementById('sidebar-nickname').textContent = `@${currentNickname}`;
            document.getElementById('topbar-avatar').src = currentUser.photoURL || 'https://picsum.photos/id/64/32/32';
            document.getElementById('sidebar-avatar').src = currentUser.photoURL || 'https://picsum.photos/id/64/40/40';
            document.getElementById('menu-avatar').src = currentUser.photoURL || 'https://picsum.photos/id/64/48/48';
            document.getElementById('menu-name').textContent = currentUser.displayName || currentNickname;
            document.getElementById('menu-nickname').textContent = `@${currentNickname}`;
            
            loadModules();        // ← Carrega apenas o "Início"
            navigateTo('feed');
            startRealtimeListeners();
        }

        function logout() {
            hideProfileMenu();
            auth.signOut().then(() => location.reload());
        }

        // ==================== MÓDULOS (só os que o usuário adiciona) ====================
        function loadModules() {
            const container = document.getElementById('modules-list');
            container.innerHTML = '';
            
            const savedOrder = JSON.parse(localStorage.getItem('modulesOrder')) || modulesOrder;
            
            savedOrder.forEach(key => {
                const mod = defaultModules[key];
                if (!mod) return;
                const div = document.createElement('div');
                div.className = `sidebar-module flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer ${currentPage === key ? 'bg-white/10' : 'hover:bg-white/10'}`;
                div.innerHTML = `<span class="text-2xl">${mod.icon}</span><span class="font-medium">${mod.label}</span>`;
                div.onclick = () => navigateTo(key);
                container.appendChild(div);
            });

            // Drag & Drop (só funciona com os módulos que já foram adicionados)
            new Sortable(container, {
                animation: 150,
                onEnd: () => {
                    const newOrder = Array.from(container.children).map(el => {
                        const text = el.textContent.trim();
                        return Object.keys(defaultModules).find(k => defaultModules[k].label === text) || 'feed';
                    });
                    modulesOrder = newOrder;
                    localStorage.setItem('modulesOrder', JSON.stringify(newOrder));
                }
            });
        }

        function showAddModuleModal() {
            const modal = document.getElementById('add-module-modal');
            const container = document.getElementById('available-modules');
            container.innerHTML = '';
            
            Object.keys(defaultModules).forEach(key => {
                if (modulesOrder.includes(key)) return; // não mostra os que já foram adicionados
                
                const mod = defaultModules[key];
                const btn = document.createElement('button');
                btn.className = "flex flex-col items-center gap-2 bg-white/10 hover:bg-white/20 rounded-2xl py-6 px-4 text-center";
                btn.innerHTML = `<span class="text-4xl">${mod.icon}</span><span class="font-medium">${mod.label}</span>`;
                btn.onclick = () => {
                    modulesOrder.push(key);
                    localStorage.setItem('modulesOrder', JSON.stringify(modulesOrder));
                    hideAddModuleModal();
                    loadModules();
                };
                container.appendChild(btn);
            });
            
            modal.classList.remove('hidden');
        }

        function hideAddModuleModal() {
            document.getElementById('add-module-modal').classList.add('hidden');
        }

        // ==================== NAVEGAÇÃO ====================
        function navigateTo(page) {
            currentPage = page;
            loadModules(); // atualiza highlight
            
            const content = document.getElementById('main-content');
            content.innerHTML = '';

            if (page === 'feed') renderFeed();
            else if (page === 'explore') renderExplore();
            else if (page === 'chat-global') showChatGlobal();
            else if (page === 'dm') renderDMs();
            else if (page === 'store') renderStore();
        }

        // ==================== FEED ====================
        async function renderFeed() {
            const content = document.getElementById('main-content');
            content.innerHTML = `
                <div class="max-w-5xl mx-auto">
                    <h1 class="text-3xl font-semibold mb-8 flex items-center gap-3">
                        <span>🏠</span> Início
                    </h1>
                    <div id="feed-container" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-8"></div>
                </div>`;

            const container = document.getElementById('feed-container');
            try {
                const snapshot = await db.collection('videos').orderBy('createdAt', 'desc').limit(12).get();
                if (snapshot.empty) {
                    container.innerHTML = `<div class="col-span-full text-center py-20 text-white/60">Nenhum vídeo ainda.<br>Seja o primeiro a fazer upload!</div>`;
                    return;
                }
                snapshot.forEach(doc => {
                    const v = doc.data();
                    const card = document.createElement('div');
                    card.className = "bg-white/5 rounded-3xl overflow-hidden border border-white/10";
                    card.innerHTML = `
                        <div class="relative">
                            <video class="w-full aspect-video object-cover" controls src="${v.url}"></video>
                            <div class="absolute top-3 right-3 bg-black/70 text-xs px-3 py-1 rounded-3xl flex items-center gap-1">
                                ❤️ <span>${v.likes || 0}</span>
                            </div>
                        </div>
                        <div class="p-4 flex gap-3">
                            <img src="${v.authorPhoto || 'https://picsum.photos/id/64/40/40'}" class="w-9 h-9 rounded-2xl">
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <p class="font-semibold">${v.authorName}</p>
                                        <p class="text-xs text-white/50">@${v.authorNickname}</p>
                                    </div>
                                    <button onclick="likeVideo('${doc.id}'); event.stopImmediatePropagation();" class="text-2xl hover:scale-110 transition">❤️</button>
                                </div>
                                <p class="mt-2 text-sm">${v.caption || ''}</p>
                            </div>
                        </div>`;
                    container.appendChild(card);
                });
            } catch (e) {
                container.innerHTML = `<div class="col-span-full text-red-400 text-center py-12">Erro ao carregar feed.</div>`;
            }
        }

        async function likeVideo(id) {
            if (!currentUser) return;
            await db.collection('videos').doc(id).update({ likes: firebase.firestore.FieldValue.increment(1) });
            renderFeed();
        }

        // ==================== UPLOAD ====================
        let selectedFile = null;
        function showUploadModal() {
            selectedFile = null;
            document.getElementById('upload-modal').classList.remove('hidden');
            document.getElementById('upload-progress-container').classList.add('hidden');
            document.getElementById('file-name').innerHTML = '';
        }
        function hideUploadModal() {
            document.getElementById('upload-modal').classList.add('hidden');
        }
        function handleVideoSelect(e) {
            selectedFile = e.target.files[0];
            if (selectedFile?.type === 'video/mp4') {
                document.getElementById('file-name').innerHTML = `✅ <span class="text-emerald-400">${selectedFile.name}</span>`;
                document.getElementById('upload-confirm-btn').disabled = false;
            } else {
                alert("Só é permitido arquivo MP4");
                selectedFile = null;
            }
        }
        async function startVideoUpload() {
            if (!selectedFile || !currentUser) return;
            const progressContainer = document.getElementById('upload-progress-container');
            progressContainer.classList.remove('hidden');
            
            const fileRef = storage.ref(`videos/${currentUser.uid}_${Date.now()}_${selectedFile.name}`);
            const uploadTask = fileRef.put(selectedFile);
            
            uploadTask.on('state_changed', 
                (snap) => {
                    const percent = Math.round((snap.bytesTransferred / snap.totalBytes) * 100);
                    document.getElementById('progress-bar').style.width = percent + '%';
                    document.getElementById('progress-percent').textContent = percent + '%';
                },
                (err) => { alert("Erro no upload: " + err.message); hideUploadModal(); },
                async () => {
                    const url = await uploadTask.snapshot.ref.getDownloadURL();
                    await db.collection('videos').add({
                        url: url,
                        authorId: currentUser.uid,
                        authorName: currentUser.displayName || currentNickname,
                        authorNickname: currentNickname,
                        authorPhoto: currentUser.photoURL,
                        caption: "Vídeo novo no Resp 🔥",
                        likes: 0,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    hideUploadModal();
                    alert("✅ Vídeo enviado com sucesso!");
                    if (currentPage === 'feed') renderFeed();
                }
            );
        }

        // ==================== OUTROS MÓDULOS (básicos) ====================
        function renderExplore() {
            document.getElementById('main-content').innerHTML = `<div class="text-center py-20"><div class="text-8xl mb-6">🔎</div><h2 class="text-3xl font-semibold">Explorar</h2><p class="text-white/60">Conteúdos em alta em breve...</p></div>`;
        }
        function showChatGlobal() {
            document.getElementById('main-content').innerHTML = `<div class="text-center py-20"><div class="text-8xl mb-6">🌍</div><h2 class="text-3xl font-semibold">Chat Global</h2><p class="text-white/60">Clique para abrir o chat completo (em breve)</p></div>`;
        }
        function renderDMs() {
            document.getElementById('main-content').innerHTML = `<div class="text-center py-20"><div class="text-8xl mb-6">💬</div><h2 class="text-3xl font-semibold">Mensagens</h2><p class="text-white/60">Suas conversas privadas aparecerão aqui</p></div>`;
        }
        function renderStore() {
            document.getElementById('main-content').innerHTML = `<div class="text-center py-20"><div class="text-8xl mb-6">🛒</div><h2 class="text-3xl font-semibold">Loja</h2><p class="text-white/60">Produtos e itens exclusivos em breve</p></div>`;
        }

        // ==================== NOTIFICAÇÕES ====================
        function showNotifications() {
            const modal = document.getElementById('notifications-modal');
            const list = document.getElementById('notifications-list');
            list.innerHTML = `<div class="p-8 text-center text-white/50">Nenhuma notificação ainda</div>`;
            modal.classList.remove('hidden');
        }
        function hideNotifications() {
            document.getElementById('notifications-modal').classList.add('hidden');
        }

        function startRealtimeListeners() {
            db.collection('notifications')
              .where('to', '==', currentUser.uid)
              .where('read', '==', false)
              .onSnapshot(snap => {
                  document.getElementById('notification-count').textContent = snap.size || '';
              });
        }

        // ==================== AUXILIARES ====================
        function showProfileMenu() { document.getElementById('profile-menu').classList.toggle('hidden'); }
        function hideProfileMenu() { document.getElementById('profile-menu').classList.add('hidden'); }
        function showRegister() {
            document.getElementById('email-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        }
        function hideRegister() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('email-form').classList.remove('hidden');
        }
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.style.transform = sidebar.style.transform === 'translateX(-100%)' ? 'translateX(0)' : 'translateX(-100%)';
            document.getElementById('hamburger-icon').innerHTML = sidebar.style.transform === 'translateX(0)' ? '✕' : '☰';
        }

        // ==================== INICIALIZAÇÃO ====================
        window.onload = () => {
            initializeFirebase();
            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    db.collection('users').doc(user.uid).get().then(doc => {
                        if (doc.exists) {
                            currentNickname = doc.data().nickname;
                            finishLogin();
                        } else {
                            document.getElementById('login-screen').classList.remove('hidden');
                        }
                    });
                } else {
                    document.getElementById('login-screen').classList.remove('hidden');
                }
            });
            console.log('%c🚀 Resp iniciado — Sidebar começa apenas com "Início". Adicione os outros módulos quando quiser!', 'background:#065fd4;color:white;padding:2px 8px;border-radius:4px');
        };
    </script>
</body>
</html>
