<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESP – Rede Social Personalizável</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

    <style>
        :root { --primary: #ff0000; --bg: #f9f9f9; --text: #0f0f0f; --border: #e5e5e5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { background-color: var(--bg); color: var(--text); }
        header { height: 56px; background: white; display: flex; align-items: center; padding: 0 16px; position: fixed; width: 100%; z-index: 100; border-bottom: 1px solid var(--border); }
        .sidebar { position: fixed; left: -240px; top: 0; width: 240px; height: 100%; background: white; transition: 0.3s; z-index: 101; padding: 70px 15px; border-right: 1px solid var(--border); }
        .sidebar.active { left: 0; }
        .module-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 5px; background: #f2f2f2; }
        main { padding: 80px 20px; max-width: 1200px; margin: 0 auto; }
        .btn-add { background: #065fd4; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .video-form { background: white; border: 1px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 20px; display: none; flex-direction: column; gap: 10px; }
        .video-form input, .video-form textarea { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .video-card { cursor: pointer; background: white; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: #000; }
        .thumbnail video { width: 100%; height: 100%; object-fit: cover; }
        #playerView { display: none; flex-direction: column; gap: 15px; }
        .main-video { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; }
        #loading { display: none; color: #065fd4; font-weight: bold; margin: 10px 0; }
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 100; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <header>
        <button onclick="toggleSidebar()" style="background:none; border:none; font-size:24px; cursor:pointer;">☰</button>
        <h3 style="margin-left:15px;">RESP - Rede Global</h3>
    </header>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <ul id="moduleList">
            <li class="module-item" onclick="changeContent('Início')">Início</li>
            <li class="module-item" onclick="changeContent('Vídeos')">Vídeos</li>
        </ul>
    </aside>

    <main>
        <section id="listView">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h1 id="pageTitle">Início</h1>
                <button id="addBtn" class="btn-add" style="display:none;" onclick="toggleForm()">+ Postar Vídeo</button>
            </div>

            <div id="videoForm" class="video-form">
                <input type="text" id="vTitle" placeholder="Título">
                <textarea id="vDesc" placeholder="Descrição"></textarea>
                <input type="file" id="vFile" accept="video/*">
                <div id="loading">Enviando vídeo para o resp-f1...</div>
                <button class="btn-add" onclick="uploadVideo()">Publicar Agora</button>
            </div>

            <div class="content-grid" id="grid"></div>
        </section>

        <section id="playerView">
            <button onclick="closePlayer()" style="margin-bottom:20px; cursor:pointer; padding:5px 15px;">← Voltar</button>
            <video id="playerElement" class="main-video" controls autoplay></video>
            <h2 id="playerTitle" style="margin-top:15px;"></h2>
            <p id="playerDesc" style="color:#606060; margin-top:10px;"></p>
        </section>
    </main>

    <script>
        // CONFIGURAÇÃO AUTOMÁTICA (Baseada na sua foto)
        const firebaseConfig = {
            apiKey: "AIzaSyAvZl2jk8i8n0e9844cxw6mGdCWXB6CZ_w",
            authDomain: "resp-f1.firebaseapp.com",
            projectId: "resp-f1",
            storageBucket: "resp-f1.firebasestorage.app",
            messagingSenderId: "616016136217",
            appId: "1:616016136217:web:ec3642b797375ce0134288"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleForm() {
            const f = document.getElementById('videoForm');
            f.style.display = (f.style.display === 'flex') ? 'none' : 'flex';
        }

        async function uploadVideo() {
            const file = document.getElementById('vFile').files[0];
            const title = document.getElementById('vTitle').value;
            const desc = document.getElementById('vDesc').value;

            if (!file) return alert("Escolha um vídeo primeiro!");
            
            document.getElementById('loading').style.display = 'block';

            try {
                const ref = storage.ref('videos/' + Date.now() + "_" + file.name);
                await ref.put(file);
                const url = await ref.getDownloadURL();

                await db.collection("videos").add({
                    title: title || "Vídeo de Arthur",
                    desc: desc || "",
                    url: url,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("Sucesso! Vídeo disponível para todos.");
                location.reload();
            } catch (error) {
                console.error(error);
                alert("Erro! Verifique se você ativou o Storage e Firestore no modo de teste.");
            }
        }

        function loadVideos() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "<p>Conectando ao resp-f1...</p>";

            db.collection("videos").orderBy("createdAt", "desc").onSnapshot((snap) => {
                grid.innerHTML = "";
                snap.forEach(doc => {
                    const v = doc.data();
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.onclick = () => {
                        document.getElementById('listView').style.display = 'none';
                        document.getElementById('playerView').style.display = 'flex';
                        document.getElementById('playerElement').src = v.url;
                        document.getElementById('playerTitle').innerText = v.title;
                        document.getElementById('playerDesc').innerText = v.desc;
                    };
                    card.innerHTML = `
                        <div class="thumbnail"><video src="${v.url}#t=0.5"></video></div>
                        <div style="padding:10px;"><h3>${v.title}</h3><p style="font-size:12px; color:gray;">Toque para assistir</p></div>
                    `;
                    grid.appendChild(card);
                });
            });
        }

        function closePlayer() {
            document.getElementById('playerElement').pause();
            document.getElementById('listView').style.display = 'block';
            document.getElementById('playerView').style.display = 'none';
        }

        function changeContent(name) {
            document.getElementById('pageTitle').innerText = name;
            document.getElementById('addBtn').style.display = (name === 'Vídeos') ? 'block' : 'none';
            if (name === 'Vídeos') loadVideos();
            else document.getElementById('grid').innerHTML = "<p>Bem-vindo à sua rede personalizável.</p>";
            if (window.innerWidth < 768) toggleSidebar();
        }

        changeContent('Início');
    </script>
</body>
</html>
