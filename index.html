<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RESP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow-x: hidden;
}

/* BOTÃO MENU */
#menuBtn {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 26px;
  cursor: pointer;
  z-index: 1000;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  left: -260px;
  top: 0;
  width: 260px;
  height: 100%;
  background: #111;
  color: white;
  transition: 0.3s;
  padding: 20px;
}

#sidebar.active {
  left: 0;
}

/* BOTÃO FECHAR */
#closeBtn {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
  font-size: 20px;
}

.module {
  background: #333;
  padding: 12px;
  margin: 12px 0;
  cursor: pointer;
  border-radius: 8px;
}

/* BOTÃO DO SUBMENU */
#openModules {
  position: absolute;
  bottom: 20px;
  left: 20px;
  font-size: 20px;
  cursor: pointer;
}

/* CONTEÚDO */
#main {
  padding: 80px 30px;
}

/* TELAS */
.screen {
  display: none;
}

.screen.active {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

.card {
  height: 150px;
  background: #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
}

/* PAINEL INFERIOR */
#bottomPanel {
  position: fixed;
  bottom: -220px;
  left: 0;
  right: 0;
  background: #222;
  color: white;
  padding: 20px;
  display: flex;
  gap: 10px;
  transition: 0.3s;
}

#bottomPanel.active {
  bottom: 0;
}

.bottom-item {
  background: #444;
  padding: 12px;
  cursor: grab;
  border-radius: 8px;
}
</style>
</head>

<body>

<!-- BOTÃO ☰ -->
<div id="menuBtn">☰</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="closeBtn">✖</div>

  <h3>RESP</h3>

  <div id="modulesList">
    <div class="module" onclick="openScreen('home')">Início</div>
  </div>

  <div id="openModules">☰☰</div>
</div>

<!-- CONTEÚDO -->
<div id="main">

  <div id="home" class="screen active">
    <div class="card">Produto</div>
    <div class="card">Vídeo</div>
    <div class="card">Post</div>
    <div class="card">Produto</div>
    <div class="card">Vídeo</div>
    <div class="card">Post</div>
  </div>

  <div id="Vídeos" class="screen"></div>
  <div id="Chat" class="screen"></div>
  <div id="Feed" class="screen"></div>
  <div id="Loja" class="screen"></div>
  <div id="Comunidade" class="screen"></div>

</div>

<!-- PAINEL -->
<div id="bottomPanel">
  <div class="bottom-item" draggable="true">Vídeos</div>
  <div class="bottom-item" draggable="true">Chat</div>
  <div class="bottom-item" draggable="true">Feed</div>
  <div class="bottom-item" draggable="true">Loja</div>
  <div class="bottom-item" draggable="true">Comunidade</div>
</div>

<script>
// ELEMENTOS
const menuBtn = document.getElementById("menuBtn");
const sidebar = document.getElementById("sidebar");
const panel = document.getElementById("bottomPanel");
const openModules = document.getElementById("openModules");
const closeBtn = document.getElementById("closeBtn");
const modulesList = document.getElementById("modulesList");

// ABRIR MENU
menuBtn.onclick = () => {
  sidebar.classList.toggle("active");
};

// FECHAR MENU
closeBtn.onclick = () => {
  sidebar.classList.remove("active");
  panel.classList.remove("active");
};

// ABRIR PAINEL
openModules.onclick = () => {
  panel.classList.toggle("active");
};

// DRAG
document.querySelectorAll('.bottom-item').forEach(item => {
  item.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text', item.innerText);
  });
});

// PERMITIR DROP NA SIDEBAR INTEIRA
sidebar.addEventListener('dragover', e => {
  e.preventDefault();
});

sidebar.addEventListener('drop', e => {
  const data = e.dataTransfer.getData('text');

  if ([...modulesList.children].some(el => el.innerText === data)) return;

  const newModule = document.createElement('div');
  newModule.className = 'module';
  newModule.innerText = data;
  newModule.onclick = () => openScreen(data);

  modulesList.appendChild(newModule);
});

// TROCAR TELA
function openScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

  const screen = document.getElementById(name);
  if (screen) {
    screen.classList.add('active');

    if (screen.innerHTML === "") {
      for (let i = 0; i < 6; i++) {
        let div = document.createElement("div");
        div.className = "card";
        div.innerText = name;
        screen.appendChild(div);
      }
    }
  }

  sidebar.classList.remove("active");
}
</script>

</body>
</html>
