<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RESP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* MENU */
#menuBtn {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 26px;
  cursor: pointer;
  z-index: 1000;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  left: -260px;
  top: 0;
  width: 260px;
  height: 100%;
  background: #111;
  color: white;
  transition: 0.3s;
  padding: 20px;
  z-index: 999;
}

#sidebar.active {
  left: 0;
}

#closeBtn {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
}

/* BOTÃO ☰☰ */
#openModules {
  position: absolute;
  bottom: 20px;
  left: 20px;
  font-size: 20px;
  cursor: pointer;
  display: none;
}

#sidebar.active #openModules {
  display: block;
}

/* CONTEÚDO */
#main {
  padding: 80px 20px;
}

.screen {
  display: none;
}

.screen.active {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
}

.card {
  height: 120px;
  background: #ddd;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* 🔥 BARRA DE BAIXO (COMEÇA INVISÍVEL TOTAL) */
#bottomPanel {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  height: 160px;
  background: #222;
  color: white;
  padding: 20px;
  display: none; /* ESSENCIAL */
  flex-direction: row;
  gap: 10px;
  z-index: 998;
}

#bottomPanel.active {
  display: flex;
}

/* ITENS */
.bottom-item {
  background: #444;
  padding: 10px;
  border-radius: 8px;
  cursor: grab;
}
</style>
</head>

<body>

<div id="menuBtn">☰</div>

<div id="sidebar">
  <div id="closeBtn">✖</div>

  <h3>RESP</h3>

  <div id="modulesList">
    <div class="bottom-item">Início</div>
  </div>

  <div id="openModules">☰☰</div>
</div>

<div id="main">
  <div id="home" class="screen active">
    <div class="card">Produto</div>
    <div class="card">Vídeo</div>
    <div class="card">Post</div>
  </div>
</div>

<div id="bottomPanel">
  <div class="bottom-item" draggable="true">Vídeos</div>
  <div class="bottom-item" draggable="true">Chat</div>
  <div class="bottom-item" draggable="true">Feed</div>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const panel = document.getElementById("bottomPanel");

// ABRIR SIDEBAR
menuBtn.onclick = () => {
  sidebar.classList.toggle("active");

  // se fechar sidebar, esconde tudo
  if (!sidebar.classList.contains("active")) {
    panel.classList.remove("active");
    panel.style.display = "none";
  }
};

// FECHAR
closeBtn.onclick = () => {
  sidebar.classList.remove("active");
  panel.classList.remove("active");
  panel.style.display = "none";
};

// ABRIR ABA DE BAIXO
openModules.onclick = () => {
  panel.style.display = "flex"; // aparece
  panel.classList.toggle("active");
};
</script>

</body>
</html>
