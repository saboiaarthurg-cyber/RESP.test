<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resp — Rede Social</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500&display=swap');
       
        :root {
            --tw-color-primary: #065fd4;
        }
       
        .tailwind-ready * {
            font-family: 'Inter', system_ui, sans-serif;
        }
       
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        .sidebar-module {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="tailwind-ready bg-gray-950 text-gray-100">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#065fd4] to-gray-900">
        <div class="max-w-md w-full mx-4 bg-white/10 backdrop-blur-xl rounded-3xl p-8 shadow-2xl border border-white/20">
            <div class="text-center mb-8">
                <div class="inline-flex items-center gap-2 text-4xl font-bold logo-font tracking-tighter text-white">
                    <span class="text-[#065fd4]">R</span>esp
                </div>
                <p class="text-white/70 mt-2">Sua rede social de vídeos</p>
            </div>

            <button onclick="handleGoogleLogin()" class="w-full flex items-center justify-center gap-3 bg-white text-gray-900 hover:bg-gray-100 py-4 rounded-2xl font-semibold text-lg transition-all mb-4">
                Entrar com Google
            </button>

            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-white/30"></div>
                <span class="text-white/50 text-sm font-medium">OU</span>
                <div class="flex-1 h-px bg-white/30"></div>
            </div>

            <div id="email-form">
                <input id="email-input" type="email" placeholder="Seu e-mail" class="w-full bg-white/10 border border-white/30 focus:border-[#065fd4] rounded-2xl px-5 py-4 mb-3 text-white placeholder:text-white/50">
                <input id="password-input" type="password" placeholder="Sua senha" class="w-full bg-white/10 border border-white/30 focus:border-[#065fd4] rounded-2xl px-5 py-4 mb-3 text-white placeholder:text-white/50">
                <button onclick="handleEmailLogin()" class="w-full bg-[#065fd4] hover:bg-[#054aa8] py-4 rounded-2xl font-semibold text-lg transition-all">
                    Entrar com E-mail
                </button>
                <div class="text-center mt-4">
                    <a href="#" onclick="showRegister()" class="text-[#065fd4] hover:underline">Criar conta</a>
                </div>
            </div>

            <div id="register-form" class="hidden">
                <input id="register-email" type="email" placeholder="E-mail" class="w-full bg-white/10 border border-white/30 focus:border-[#065fd4] rounded-2xl px-5 py-4 mb-3 text-white placeholder:text-white/50">
                <input id="register-password" type="password" placeholder="Senha (mín. 6 caracteres)" class="w-full bg-white/10 border border-white/30 focus:border-[#065fd4] rounded-2xl px-5 py-4 mb-6 text-white placeholder:text-white/50">
                <button onclick="handleEmailRegister()" class="w-full bg-[#065fd4] hover:bg-[#054aa8] py-4 rounded-2xl font-semibold text-lg transition-all">
                    Criar conta
                </button>
                <button onclick="hideRegister()" class="w-full mt-3 text-white/70 hover:text-white">Voltar</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden min-h-screen flex">
       
        <!-- SIDEBAR -->
        <div id="sidebar" class="w-72 bg-gray-900 border-r border-white/10 flex flex-col transition-all duration-300">
           
            <div class="px-6 pt-6 pb-4 flex items-center justify-between border-b border-white/10">
                <div onclick="navigateTo('home')" class="cursor-pointer hover:opacity-80">
                    <span class="text-3xl font-bold logo-font tracking-tighter text-white">Resp</span>
                </div>
                <button onclick="toggleDarkMode()" class="p-2 hover:bg-white/10 rounded-xl">
                    <span id="dark-mode-icon" class="text-2xl">☀️</span>
                </button>
            </div>

            <!-- Lista de módulos -->
            <div class="flex-1 px-3 py-6 overflow-y-auto" id="sidebar-modules">
                <div id="modules-list" class="space-y-1"></div>
            </div>

            <!-- Botão adicionar módulo -->
            <div class="px-6 pb-6">
                <button onclick="showAddModuleModal()" class="w-full flex items-center justify-center gap-2 bg-white/10 hover:bg-white/20 text-white py-3 rounded-2xl font-medium">
                    <span class="text-2xl leading-none">+</span>
                    <span>Adicionar módulo</span>
                </button>
            </div>

            <!-- Perfil -->
            <div onclick="showProfileMenu()" class="px-6 py-4 border-t border-white/10 flex items-center gap-3 cursor-pointer hover:bg-white/10">
                <img id="sidebar-avatar" src="https://picsum.photos/id/64/40/40" alt="" class="w-9 h-9 rounded-2xl object-cover">
                <div class="flex-1 min-w-0">
                    <p id="sidebar-name" class="font-semibold truncate">Carregando...</p>
                    <p id="sidebar-nickname" class="text-xs text-white/50 truncate">@...</p>
                </div>
                <span class="text-2xl">▼</span>
            </div>
        </div>

        <!-- MOBILE HAMBURGER -->
        <div onclick="toggleMobileSidebar()" class="lg:hidden fixed top-4 left-4 z-50 bg-[#065fd4] text-white w-10 h-10 flex items-center justify-center rounded-2xl shadow-xl">
            <span id="hamburger-icon" class="text-3xl">☰</span>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="flex-1 flex flex-col min-h-screen">
            <div class="h-16 bg-white/5 backdrop-blur-lg border-b border-white/10 px-6 flex items-center justify-between sticky top-0 z-40">
                <div class="flex-1 max-w-xl">
                    <div class="bg-white/10 hover:bg-white/20 flex items-center gap-3 px-5 h-11 rounded-3xl text-white/70 cursor-text">
                        <span class="text-xl">🔎</span>
                        <input id="search-input" type="text" placeholder="Buscar vídeos ou @nicknames" class="flex-1 bg-transparent outline-none text-sm placeholder:text-white/40">
                    </div>
                </div>
                <div class="flex items-center gap-5">
                    <div onclick="showNotifications()" class="relative cursor-pointer">
                        <span class="text-3xl">🛎️</span>
                        <span id="notification-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
                    </div>
                    <button onclick="showUploadModal()" class="flex items-center gap-2 bg-[#065fd4] hover:bg-[#054aa8] px-6 h-10 rounded-3xl font-semibold text-sm">
                        <span class="text-xl leading-none">+</span>
                        <span>Upload</span>
                    </button>
                    <div onclick="showProfileMenu()" class="flex items-center gap-2 cursor-pointer">
                        <img id="topbar-avatar" src="https://picsum.photos/id/64/32/32" alt="" class="w-8 h-8 rounded-2xl ring-2 ring-[#065fd4]/30">
                    </div>
                </div>
            </div>
            <div class="flex-1 overflow-auto p-6" id="main-content">
                <!-- Conteúdo dinâmico -->
            </div>
        </div>
    </div>

    <!-- MODAIS (mantidos) -->
    <!-- Upload Modal, Nickname Modal, Notifications, Add Module, Profile Menu -->
    <!-- (mantidos iguais ao seu código original) -->

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAvZl2jk8i8n0e9844cxw6mGdCWXB6CZ_w",
            authDomain: "resp-f1.firebaseapp.com",
            projectId: "resp-f1",
            storageBucket: "resp-f1.firebasestorage.app",
            messagingSenderId: "616016136217",
            appId: "1:616016136217:web:ec3642b797375ce0134288"
        };

        let app, auth, db, storage;
        let currentUser = null;
        let currentNickname = null;
        let currentPage = 'feed';

        let modulesOrder = ['home'];
        const defaultModules = {
            home: { icon: '🏠', label: 'Início' },
            videos: { icon: '🎥', label: 'Vídeos' },
            explore: { icon: '🔎', label: 'Explorar' },
            'chat-global': { icon: '🌍', label: 'Chat Global' },
            dm: { icon: '💬', label: 'Mensagens' },
            store: { icon: '🛒', label: 'Loja' }
        };

        function initializeFirebase() {
            if (!app) {
                app = firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
                storage = firebase.storage();
            }
        }

        // ==================== LOGIN ====================
        async function handleGoogleLogin() {
            initializeFirebase();
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                await handleFirstLogin(result.user);
            } catch (e) { alert("Erro Google: " + e.message); }
        }

        async function handleEmailLogin() {
            initializeFirebase();
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value;
            if (!email || !password) return alert("Preencha todos os campos");
            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                await handleFirstLogin(result.user);
            } catch (e) { alert("Erro login: " + e.message); }
        }

        async function handleEmailRegister() {
            initializeFirebase();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            if (!email || password.length < 6) return alert("Senha mínima de 6 caracteres");
            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                await handleFirstLogin(result.user);
            } catch (e) { alert("Erro cadastro: " + e.message); }
        }

        async function handleFirstLogin(user) {
            currentUser = user;
            const doc = await db.collection('users').doc(user.uid).get();
            if (!doc.exists) {
                document.getElementById('nickname-modal').classList.remove('hidden');
                return;
            }
            currentNickname = doc.data().nickname;
            finishLogin();
        }

        async function saveNickname() {
            const nickname = document.getElementById('nickname-input').value.trim().toLowerCase();
            if (!nickname || !/^[a-z0-9_]{3,20}$/.test(nickname)) {
                showNicknameError("Use apenas letras minúsculas, números e _ (3-20 caracteres)");
                return;
            }
            const snapshot = await db.collection('users').where('nickname', '==', nickname).get();
            if (!snapshot.empty) {
                showNicknameError("Esse nickname já está em uso");
                return;
            }
            await db.collection('users').doc(currentUser.uid).set({
                uid: currentUser.uid,
                email: currentUser.email,
                nickname: nickname,
                displayName: currentUser.displayName || nickname,
                photoURL: currentUser.photoURL || `https://picsum.photos/id/${Math.floor(Math.random()*100)}/128/128`,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            currentNickname = nickname;
            document.getElementById('nickname-modal').classList.add('hidden');
            finishLogin();
        }

        function showNicknameError(msg) {
            const el = document.getElementById('nickname-error');
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3500);
        }

        function finishLogin() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
           
            document.getElementById('sidebar-name').textContent = currentUser.displayName || currentNickname;
            document.getElementById('sidebar-nickname').textContent = `@${currentNickname}`;
            document.getElementById('topbar-avatar').src = currentUser.photoURL || 'https://picsum.photos/id/64/32/32';
            document.getElementById('sidebar-avatar').src = currentUser.photoURL || 'https://picsum.photos/id/64/40/40';
            document.getElementById('menu-avatar').src = currentUser.photoURL || 'https://picsum.photos/id/64/48/48';
            document.getElementById('menu-name').textContent = currentUser.displayName || currentNickname;
            document.getElementById('menu-nickname').textContent = `@${currentNickname}`;
           
            loadModules();
            navigateTo('feed');
        }

        // ==================== MÓDULOS ====================
        function loadModules() {
            const container = document.getElementById('modules-list');
            container.innerHTML = '';

            const savedOrder = JSON.parse(localStorage.getItem('modulesOrder')) || modulesOrder;

            savedOrder.forEach(key => {
                const mod = defaultModules[key];
                if (!mod) return;
                const div = document.createElement('div');
                div.className = `sidebar-module flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer ${currentPage === key ? 'bg-white/10' : 'hover:bg-white/10'}`;
                div.innerHTML = `<span class="text-2xl">${mod.icon}</span><span class="font-medium">${mod.label}</span>`;
                div.onclick = () => navigateTo(key);
                container.appendChild(div);
            });

            new Sortable(container, {
                animation: 150,
                onEnd: () => {
                    const newOrder = Array.from(container.children).map(el => {
                        const text = el.textContent.trim();
                        return Object.keys(defaultModules).find(k => defaultModules[k].label === text) || 'home';
                    });
                    modulesOrder = newOrder;
                    localStorage.setItem('modulesOrder', JSON.stringify(newOrder));
                }
            });
        }

        function showAddModuleModal() {
            const modal = document.getElementById('add-module-modal');
            const container = document.getElementById('available-modules');
            container.innerHTML = '';

            const currentOrder = JSON.parse(localStorage.getItem('modulesOrder')) || modulesOrder;

            Object.keys(defaultModules).forEach(key => {
                if (currentOrder.includes(key)) return;
                const mod = defaultModules[key];
                const btn = document.createElement('button');
                btn.className = "flex flex-col items-center gap-2 bg-white/10 hover:bg-white/20 rounded-2xl py-6 px-4 text-center";
                btn.innerHTML = `<span class="text-4xl">${mod.icon}</span><span class="font-medium">${mod.label}</span>`;
                btn.onclick = () => {
                    currentOrder.push(key);
                    localStorage.setItem('modulesOrder', JSON.stringify(currentOrder));
                    modulesOrder = currentOrder;
                    hideAddModuleModal();
                    loadModules();
                };
                container.appendChild(btn);
            });

            modal.classList.remove('hidden');
        }

        function hideAddModuleModal() {
            document.getElementById('add-module-modal').classList.add('hidden');
        }

        // ==================== NAVEGAÇÃO ====================
        function navigateTo(page) {
            currentPage = page;
            loadModules();

            const content = document.getElementById('main-content');
            content.innerHTML = '';

            if (page === 'feed') renderFeed();
            else if (page === 'explore') renderExplore();
            else if (page === 'chat-global') showChatGlobal();
            else if (page === 'dm') renderDMs();
            else if (page === 'store') renderStore();
        }

        // ==================== FUNÇÕES BÁSICAS DOS MÓDULOS ====================
        function renderFeed() {
            document.getElementById('main-content').innerHTML = `<div class="text-center py-20 text-white/70">Feed em desenvolvimento...</div>`;
        }

        function renderExplore() {
            document.getElementById('main-content').innerHTML = `<div class="text-center py-20 text-white/70">Explorar em breve...</div>`;
        }

        function showChatGlobal() {
            document.getElementById('main-content').innerHTML = `<div class="text-center py-20 text-white/70">Chat Global em breve...</div>`;
        }

        function renderDMs() {
            document.getElementById('main-content').innerHTML = `<div class="text-center py-20 text-white/70">Mensagens em breve...</div>`;
        }

        function renderStore() {
            document.getElementById('main-content').innerHTML = `<div class="text-center py-20 text-white/70">Loja em breve...</div>`;
        }

        // ==================== DARK MODE ====================
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.contains('dark');
            document.documentElement.classList.toggle('dark', !isDark);
            document.getElementById('dark-mode-icon').innerHTML = isDark ? '☀️' : '🌙';
        }

        // ==================== OUTRAS FUNÇÕES ====================
        function showUploadModal() { alert("Upload de vídeo em breve"); }
        function showNotifications() { alert("Notificações em breve"); }
        function showProfileMenu() { document.getElementById('profile-menu').classList.toggle('hidden'); }
        function hideProfileMenu() { document.getElementById('profile-menu').classList.add('hidden'); }
        function showRegister() {
            document.getElementById('email-form').classList.add('hidden');
            document.getElementById('register-form').classList.remove('hidden');
        }
        function hideRegister() {
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('email-form').classList.remove('hidden');
        }
        function toggleMobileSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.style.transform = (sidebar.style.transform === 'translateX(-100%)' || !sidebar.style.transform) ? 'translateX(0)' : 'translateX(-100%)';
            document.getElementById('hamburger-icon').innerHTML = sidebar.style.transform === 'translateX(0)' ? '✕' : '☰';
        }

        // ==================== INICIALIZAÇÃO ====================
        window.onload = () => {
            initializeFirebase();
            console.log('%c🚀 Resp carregado com sucesso!', 'color:#065fd4; font-weight:bold');

            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    db.collection('users').doc(user.uid).get().then(doc => {
                        if (doc.exists) {
                            currentNickname = doc.data().nickname;
                            finishLogin();
                        } else {
                            document.getElementById('login-screen').classList.remove('hidden');
                        }
                    });
                } else {
                    document.getElementById('login-screen').classList.remove('hidden');
                }
            });
        };
    </script>
</body>
</html>
