<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESP • Sua rede, do seu jeito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-storage-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500&display=swap');
        
        :root { --primary: #065fd4; }
        * { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Inter', system_ui, sans-serif; }
        .dark body { background-color: #111; }
        
        .logo-font { font-family: 'Space Grotesk', sans-serif; }
        .chat-bubble { max-width: 75%; padding: 14px 20px; border-radius: 25px; }
        .message-img { max-width: 100%; border-radius: 18px; margin-top: 8px; }
        
        .chat-container { height: calc(100vh - 220px); overflow-y: auto; scroll-behavior: smooth; }
        
        @media (max-width: 768px) {
            .sidebar { 
                position: fixed; 
                left: 0; 
                top: 0; 
                height: 100vh; 
                z-index: 9999; 
                transform: translateX(-100%); 
                width: 280px; 
            }
            .sidebar.open { transform: translateX(0); }
            .overlay { 
                position: fixed; 
                inset: 0; 
                background: rgba(0,0,0,0.7); 
                z-index: 9998; 
                display: none; 
            }
            .overlay.show { display: block; }
            .chat-container { height: calc(100vh - 190px); }
        }
    </style>
</head>
<body class="bg-gray-950 text-gray-100">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-[#065fd4] to-gray-900">
        <div class="max-w-md w-full mx-4 bg-white/10 backdrop-blur-xl rounded-3xl p-8 shadow-2xl border border-white/20">
            <div class="text-center mb-8">
                <div class="inline-flex items-center gap-2 text-5xl font-bold logo-font tracking-tighter text-white">
                    <span class="text-[#065fd4]">R</span>esp
                </div>
                <p class="text-white/70 mt-2">Sua rede, do seu jeito</p>
            </div>
            
            <button onclick="handleGoogleLogin()" class="w-full flex items-center justify-center gap-3 bg-white text-gray-900 hover:bg-gray-100 py-4 rounded-2xl font-semibold text-lg transition-all mb-4">
                Entrar com Google
            </button>
            
            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-white/30"></div>
                <span class="text-white/50 text-sm font-medium">OU</span>
                <div class="flex-1 h-px bg-white/30"></div>
            </div>
            
            <input id="email-input" type="email" placeholder="Seu e-mail" class="w-full bg-white/10 border border-white/30 focus:border-[#065fd4] rounded-2xl px-5 py-4 mb-3 text-white placeholder:text-white/50">
            <input id="password-input" type="password" placeholder="Sua senha" class="w-full bg-white/10 border border-white/30 focus:border-[#065fd4] rounded-2xl px-5 py-4 mb-6 text-white placeholder:text-white/50">
            
            <button onclick="handleEmailLogin()" class="w-full bg-[#065fd4] hover:bg-[#054aa8] py-4 rounded-2xl font-semibold text-lg">Entrar com E-mail</button>
            
            <div class="text-center mt-6">
                <a href="#" onclick="showRegister()" class="text-[#065fd4] hover:underline">Criar conta nova</a>
            </div>
        </div>
    </div>

    <!-- SETUP NICKNAME -->
    <div id="setup-screen" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[9999]">
        <div class="bg-white/10 backdrop-blur-2xl rounded-3xl p-8 max-w-sm w-full mx-4 text-center">
            <h2 class="text-3xl font-semibold mb-2">Último passo!</h2>
            <p class="text-white/70 mb-8">Escolha seu nickname único</p>
            <input id="nickname-input" type="text" maxlength="20" class="w-full bg-white/10 border border-white/30 focus:border-[#065fd4] rounded-2xl px-5 py-4 text-xl text-center" placeholder="@seu_nick">
            <p id="nickname-error" class="text-red-400 text-sm mt-4 hidden"></p>
            <button onclick="saveNickname()" class="mt-8 w-full bg-[#065fd4] py-5 rounded-2xl font-semibold text-lg">Confirmar e entrar</button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" class="hidden min-h-screen flex">
        <div id="overlay" onclick="toggleMobileSidebar()" class="overlay"></div>

        <!-- SIDEBAR -->
        <div id="sidebar" class="sidebar w-72 flex flex-col h-full border-r border-white/10 bg-gray-900">
            <div class="px-6 pt-6 pb-4 flex items-center justify-between border-b border-white/10 md:hidden">
                <div class="text-3xl font-bold logo-font">Resp</div>
                <button onclick="toggleMobileSidebar()" class="text-3xl">✕</button>
            </div>
            
            <div id="sidebar-modules" class="flex-1 px-3 py-6 overflow-y-auto"></div>
            
            <div onclick="showAddModuleModal()" class="mx-6 mb-6 flex items-center justify-center gap-2 bg-white/10 hover:bg-white/20 py-4 rounded-2xl cursor-pointer">
                <span class="text-2xl">+</span>
                <span class="font-medium">Adicionar módulo</span>
            </div>
            
            <div onclick="showProfileMenu()" class="px-6 py-4 border-t border-white/10 flex items-center gap-3 cursor-pointer hover:bg-white/10">
                <img id="sidebar-avatar" src="https://picsum.photos/id/64/40/40" class="w-9 h-9 rounded-2xl">
                <div class="flex-1">
                    <p id="sidebar-name" class="font-semibold"></p>
                    <p id="sidebar-nickname" class="text-xs text-white/50"></p>
                </div>
            </div>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="flex-1 flex flex-col">
            <div class="h-16 bg-white/5 backdrop-blur-lg border-b border-white/10 px-6 flex items-center justify-between sticky top-0 z-40">
                <button onclick="toggleMobileSidebar()" class="md:hidden text-3xl">☰</button>
                <div id="current-page-title" class="text-2xl font-semibold">Início</div>
                
                <div class="flex items-center gap-6">
                    <div onclick="showNotifications()" class="relative cursor-pointer text-3xl">🛎️
                        <span id="notification-count" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full hidden">0</span>
                    </div>
                    <div onclick="showProfileMenu()" class="cursor-pointer">
                        <img id="topbar-avatar" src="https://picsum.photos/id/64/32/32" class="w-8 h-8 rounded-2xl">
                    </div>
                </div>
            </div>
            
            <div id="main-content" class="flex-1 overflow-auto p-6"></div>
        </div>
    </div>

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAvZl2jk8i8n0e9844cxw6mGdCWXB6CZ_w",
            authDomain: "resp-f1.firebaseapp.com",
            projectId: "resp-f1",
            storageBucket: "resp-f1.firebasestorage.app",
            messagingSenderId: "616016136217",
            appId: "1:616016136217:web:ec3642b797375ce0134288"
        };

        let app, auth, db, storage;
        let currentUser = null;
        let currentNickname = null;
        let activeModule = 'home';

        const defaultModules = {
            home: { icon: '🏠', label: 'Início' },
            videos: { icon: '🎥', label: 'Vídeos' },
            explore: { icon: '🔎', label: 'Explorar' },
            'chat-global': { icon: '🌍', label: 'Chat Global' },
            dm: { icon: '💬', label: 'Mensagens' }
        };

        let modulesOrder = ['home'];

        function initializeFirebase() {
            if (!app) {
                app = firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
                storage = firebase.storage();
            }
        }

        // ==================== LOGIN ====================
        async function handleGoogleLogin() {
            initializeFirebase();
            const provider = new firebase.auth.GoogleAuthProvider();
            try {
                const result = await auth.signInWithPopup(provider);
                await handleUserLogin(result.user);
            } catch (e) { alert("Erro no Google: " + e.message); }
        }

        async function handleEmailLogin() {
            initializeFirebase();
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value;
            if (!email || !password) return alert("Preencha e-mail e senha");
            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                await handleUserLogin(result.user);
            } catch (e) { alert("Erro no login: " + e.message); }
        }

        async function handleUserLogin(user) {
            currentUser = user;
            const doc = await db.collection('users').doc(user.uid).get();
            if (!doc.exists) {
                document.getElementById('setup-screen').classList.remove('hidden');
                return;
            }
            currentNickname = doc.data().nickname;
            finishLogin();
        }

        async function saveNickname() {
            const nick = document.getElementById('nickname-input').value.trim().toLowerCase();
            if (!nick || nick.length < 3) return alert("Nickname deve ter pelo menos 3 caracteres");
            
            const exists = await db.collection('users').where('nickname', '==', nick).get();
            if (!exists.empty) return alert("Esse nickname já está em uso");
            
            await db.collection('users').doc(currentUser.uid).set({
                nickname: nick,
                email: currentUser.email,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            
            currentNickname = nick;
            document.getElementById('setup-screen').classList.add('hidden');
            finishLogin();
        }

        function finishLogin() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            
            document.getElementById('sidebar-name').textContent = currentUser.displayName || currentNickname;
            document.getElementById('sidebar-nickname').textContent = `@${currentNickname}`;
            
            loadModules();
            navigateTo('home');
        }

        // ==================== LOGOUT ====================
        function logout() {
            if (auth) {
                auth.signOut().then(() => {
                    location.reload();
                });
            }
        }

        // ==================== SIDEBAR ====================
        function loadModules() {
            const container = document.getElementById('sidebar-modules');
            container.innerHTML = '';

            const saved = JSON.parse(localStorage.getItem('modulesOrder')) || modulesOrder;

            saved.forEach(key => {
                const mod = defaultModules[key];
                if (!mod) return;
                const div = document.createElement('div');
                div.className = `flex items-center gap-3 px-4 py-3 rounded-2xl cursor-pointer hover:bg-white/10 ${activeModule === key ? 'bg-white/10' : ''}`;
                div.innerHTML = `<span class="text-2xl">${mod.icon}</span><span>${mod.label}</span>`;
                div.onclick = () => navigateTo(key);
                container.appendChild(div);
            });
        }

        function showAddModuleModal() {
            alert("Adicionar módulo será implementado na próxima atualização.");
        }

        function toggleMobileSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        // ==================== NAVEGAÇÃO ====================
        function navigateTo(page) {
            activeModule = page;
            loadModules();
            
            const content = document.getElementById('main-content');
            content.innerHTML = '';

            if (page === 'home') {
                content.innerHTML = `<h1 class="text-4xl font-semibold">Bem-vindo ao RESP, @${currentNickname}!</h1>`;
            } else if (page === 'chat-global') {
                renderChatGlobal();
            } else {
                content.innerHTML = `<div class="text-center py-20 text-2xl">Módulo ${page} em desenvolvimento...</div>`;
            }
        }

        // ==================== CHAT GLOBAL ====================
        function renderChatGlobal() {
            const content = document.getElementById('main-content');
            content.innerHTML = `
                <div class="flex flex-col h-full">
                    <h2 class="text-3xl font-semibold mb-4">Chat Global</h2>
                    <div id="chat-messages" class="chat-container bg-white/5 rounded-3xl p-6 flex-1 overflow-y-auto"></div>
                    <div class="mt-4 bg-white/5 p-4 rounded-3xl flex gap-3">
                        <input id="chat-input" type="text" placeholder="Digite sua mensagem..." class="flex-1 bg-white/10 border border-white/30 focus:border-[#065fd4] rounded-3xl px-6 py-4 outline-none">
                        <label class="cursor-pointer bg-white/10 hover:bg-white/20 w-12 h-12 rounded-3xl flex items-center justify-center text-2xl">📷
                            <input type="file" id="chat-image-input" accept="image/*" class="hidden" onchange="sendMedia('image')">
                        </label>
                        <label class="cursor-pointer bg-white/10 hover:bg-white/20 w-12 h-12 rounded-3xl flex items-center justify-center text-2xl">🎤
                            <input type="file" id="chat-audio-input" accept="audio/*" class="hidden" onchange="sendMedia('audio')">
                        </label>
                        <button onclick="sendTextMessage()" class="bg-[#065fd4] w-12 h-12 rounded-3xl text-3xl">↑</button>
                    </div>
                </div>`;
            loadChatMessages();
        }

        function loadChatMessages() {
            const container = document.getElementById('chat-messages');
            db.collection('messages').orderBy('timestamp').onSnapshot(snapshot => {
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const m = doc.data();
                    const isMine = m.uid === currentUser.uid;
                    let html = `<div class="flex ${isMine ? 'justify-end' : 'justify-start'}"><div class="${isMine ? 'bg-[#065fd4]' : 'bg-white/10'} chat-bubble">`;
                    if (m.text) html += `<p>${m.text}</p>`;
                    if (m.imageUrl) html += `<img src="${m.imageUrl}" class="message-img">`;
                    if (m.audioUrl) html += `<audio controls class="mt-2 w-full"><source src="${m.audioUrl}"></audio>`;
                    html += `</div></div>`;
                    container.innerHTML += html;
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        async function sendTextMessage() {
            const input = document.getElementById('chat-input');
            const text = input.value.trim();
            if (!text) return;
            await db.collection('messages').add({
                uid: currentUser.uid,
                nickname: currentNickname,
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            input.value = '';
        }

        async function sendMedia(type) {
            const inputId = type === 'image' ? 'chat-image-input' : 'chat-audio-input';
            const file = document.getElementById(inputId).files[0];
            if (!file) return;

            const folder = type === 'image' ? 'chat-images' : 'chat-audios';
            const ref = storage.ref(`${folder}/${currentUser.uid}/${Date.now()}_${file.name}`);
            const task = ref.put(file);
            
            task.on('state_changed', null, null, async () => {
                const url = await ref.getDownloadURL();
                await db.collection('messages').add({
                    uid: currentUser.uid,
                    nickname: currentNickname,
                    [type === 'image' ? 'imageUrl' : 'audioUrl']: url,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            });
        }

        // ==================== OUTRAS FUNÇÕES ====================
        function showProfileMenu() {
            if (confirm("Deseja sair da conta?")) {
                logout();
            }
        }

        function showNotifications() {
            alert("Notificações em breve");
        }

        function showAddModuleModal() {
            alert("Adicionar módulo em breve");
        }

        function toggleMobileSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        // ==================== INICIALIZAÇÃO ====================
        window.onload = () => {
            initializeFirebase();
            console.log('%c🚀 RESP V9.0 - Código completo para GitHub Pages', 'background:#065fd4;color:white;padding:8px;border-radius:8px');

            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    db.collection('users').doc(user.uid).get().then(doc => {
                        if (doc.exists) {
                            currentNickname = doc.data().nickname;
                            finishLogin();
                        } else {
                            document.getElementById('login-screen').classList.remove('hidden');
                        }
                    });
                } else {
                    document.getElementById('login-screen').classList.remove('hidden');
                }
            });
        };
    </script>
</body>
</html>
