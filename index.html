<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESP • Sua rede, do seu jeito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-storage-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        
        :root { --primary: #065fd4; }
        * { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        body { font-family: 'Inter', system_ui, sans-serif; }
        .dark body { background-color: #111; }
        
        .sidebar { background: white; box-shadow: 4px 0 20px -4px rgb(0 0 0 / 0.1); }
        .dark .sidebar { background: #1a1a1a; }
        
        .module-item { border-radius: 25px; }
        .chat-bubble { max-width: 75%; padding: 14px 20px; border-radius: 25px; }
        .message-img { max-width: 100%; border-radius: 18px; margin-top: 8px; }
        
        .chat-container { height: calc(100vh - 220px); overflow-y: auto; scroll-behavior: smooth; }
        
        /* Mobile Responsivo */
        @media (max-width: 768px) {
            .sidebar { 
                position: fixed; 
                left: 0; 
                top: 0; 
                height: 100vh; 
                z-index: 9999; 
                transform: translateX(-100%); 
                width: 280px; 
            }
            .sidebar.open { transform: translateX(0); }
            .overlay { 
                position: fixed; 
                inset: 0; 
                background: rgba(0,0,0,0.5); 
                z-index: 9998; 
                display: none; 
            }
            .overlay.show { display: block; }
            .chat-container { height: calc(100vh - 190px); }
        }
    </style>
</head>
<body class="bg-[#f1f1f1] min-h-screen flex flex-col overflow-hidden dark:bg-[#111]">

    <!-- LOGIN -->
    <div id="login-screen" class="flex-1 flex items-center justify-center bg-white dark:bg-[#111]">
        <div class="max-w-md w-full px-8 py-12 bg-white dark:bg-[#1a1a1a] rounded-3xl shadow-2xl">
            <div class="flex items-center justify-center gap-3 mb-10">
                <div class="w-12 h-12 bg-[#065fd4] text-white rounded-2xl flex items-center justify-center text-3xl shadow-inner">📱</div>
                <h1 class="text-4xl font-semibold tracking-tighter text-gray-900 dark:text-white">RESP</h1>
            </div>
            <h2 class="text-2xl font-semibold text-center mb-2 dark:text-white">Bem-vindo de volta</h2>
            <p class="text-gray-500 dark:text-gray-400 text-center mb-8">Entre para continuar sua rede personalizada</p>
            
            <button onclick="loginWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white dark:bg-[#1a1a1a] border border-gray-300 dark:border-gray-700 hover:border-gray-400 text-gray-700 dark:text-gray-300 font-medium py-4 rounded-3xl mb-4">Continuar com Google</button>
            
            <div class="flex items-center gap-3 my-6">
                <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
                <span class="text-gray-400 text-sm font-medium">ou</span>
                <div class="flex-1 h-px bg-gray-200 dark:bg-gray-700"></div>
            </div>
            
            <div class="space-y-4">
                <input id="email-input" type="email" placeholder="seu@email.com" class="w-full px-5 py-4 bg-gray-100 dark:bg-[#222] rounded-3xl outline-none dark:text-white">
                <input id="password-input" type="password" placeholder="••••••••" class="w-full px-5 py-4 bg-gray-100 dark:bg-[#222] rounded-3xl outline-none dark:text-white">
                <button onclick="handleEmailLogin()" class="w-full bg-[#065fd4] text-white font-semibold py-4 rounded-3xl">Entrar com E-mail</button>
            </div>
        </div>
    </div>

    <!-- SETUP -->
    <div id="setup-screen" class="hidden fixed inset-0 flex items-center justify-center bg-white dark:bg-[#111] z-[9999]">
        <div class="max-w-md w-full px-8 py-12 bg-white dark:bg-[#1a1a1a] rounded-3xl shadow-2xl text-center">
            <h2 class="text-3xl font-semibold mb-2 dark:text-white">Último passo!</h2>
            <p class="text-gray-600 dark:text-gray-400 mb-8">Escolha seu nickname único</p>
            <input id="nickname-input" type="text" maxlength="20" class="w-full px-6 py-5 text-center text-2xl bg-gray-100 dark:bg-[#222] rounded-3xl outline-none mb-8 dark:text-white" placeholder="@seu_nick">
            <button onclick="saveNickname()" class="w-full bg-[#065fd4] text-white font-semibold py-5 rounded-3xl text-xl">Confirmar e entrar</button>
            <p id="setup-error" class="text-red-500 text-sm mt-4 hidden"></p>
        </div>
    </div>

    <!-- APP PRINCIPAL -->
    <div id="app-screen" class="hidden flex-1 flex overflow-hidden">
        <!-- Overlay para mobile -->
        <div id="overlay" onclick="toggleMobileSidebar()" class="overlay"></div>

        <!-- SIDEBAR -->
        <div id="sidebar" class="sidebar w-72 flex flex-col h-full border-r border-gray-100 dark:border-gray-800 py-6 px-4">
            <div class="flex items-center justify-between px-4 mb-8 md:hidden">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-[#065fd4] text-white rounded-2xl flex items-center justify-center text-3xl">📱</div>
                    <h1 class="text-3xl font-semibold tracking-[-1px] dark:text-white">RESP</h1>
                </div>
                <button onclick="toggleMobileSidebar()" class="text-3xl">✕</button>
            </div>
            
            <div id="sidebar-modules" class="flex-1 px-2 space-y-1 overflow-y-auto"></div>
            
            <div onclick="toggleCustomizePanel()" class="mx-4 mt-auto flex items-center justify-center gap-3 bg-[#065fd4] text-white hover:bg-[#054aa8] font-medium py-4 rounded-3xl cursor-pointer text-base shadow-lg">
                <span class="text-2xl">🛠️</span> Personalizar Barra
            </div>
            
            <div onclick="showUserMenu()" class="mt-6 mx-4 flex items-center gap-3 cursor-pointer">
                <div id="user-avatar" class="w-9 h-9 bg-gray-200 dark:bg-gray-700 rounded-2xl flex items-center justify-center text-xl">👤</div>
                <div class="flex-1 min-w-0">
                    <p id="user-nick-sidebar" class="font-semibold text-gray-900 dark:text-white truncate"></p>
                    <p id="user-email-sidebar" class="text-xs text-gray-400 truncate"></p>
                </div>
            </div>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <div class="flex-1 flex flex-col main-content">
            <div class="h-16 border-b bg-white/80 dark:bg-[#1a1a1a]/80 backdrop-blur flex items-center px-4 md:px-8 justify-between">
                <button onclick="toggleMobileSidebar()" class="md:hidden text-3xl mr-4">☰</button>
                <div id="current-page-title" class="text-2xl font-semibold text-gray-900 dark:text-white">Início</div>
                
                <div class="flex items-center gap-6">
                    <div onclick="showNotifications()" class="relative cursor-pointer text-2xl">🛎️
                        <span id="notification-badge" class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center hidden">0</span>
                    </div>
                    <div onclick="showUserMenu()" id="header-avatar" class="w-8 h-8 bg-[#065fd4] text-white rounded-2xl flex items-center justify-center cursor-pointer">👤</div>
                </div>
            </div>
            
            <div id="main-content-area" class="flex-1 p-4 md:p-8 overflow-auto"></div>
        </div>
    </div>

    <!-- PAINEL PERSONALIZAÇÃO -->
    <div id="customize-panel" onclick="if(event.target.id === 'customize-panel') toggleCustomizePanel()" class="hidden fixed inset-0 bg-black/60 z-[3000] flex items-end">
        <div onclick="event.stopImmediatePropagation()" class="bg-black text-white w-full max-w-2xl mx-auto rounded-t-3xl p-8">
            <h2 class="text-2xl font-semibold mb-6">Personalize sua Barra Lateral</h2>
            <div id="available-modules" class="grid grid-cols-2 gap-4"></div>
        </div>
    </div>

    <!-- MODAL UPLOAD VÍDEO -->
    <div id="video-upload-modal" onclick="if(event.target.id === 'video-upload-modal') hideVideoModal()" class="hidden fixed inset-0 bg-black/70 z-[5000] flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" class="bg-white dark:bg-[#1a1a1a] rounded-3xl w-full max-w-lg p-8">
            <h3 class="text-2xl font-semibold mb-6 dark:text-white">Enviar novo vídeo</h3>
            <div id="upload-dropzone" onclick="document.getElementById('video-file-input').click()" class="border-2 border-dashed border-gray-300 dark:border-gray-600 hover:border-[#065fd4] rounded-3xl h-64 flex flex-col items-center justify-center cursor-pointer">
                <span class="text-6xl mb-4">📤</span>
                <p class="font-medium dark:text-white">Clique ou arraste um MP4 aqui</p>
                <input type="file" id="video-file-input" accept="video/mp4" class="hidden" onchange="handleVideoUpload(event)">
            </div>
            <div id="progress-container" class="hidden mt-6">
                <div class="flex justify-between text-xs mb-2 dark:text-gray-400"><span>Enviando...</span><span id="progress-text">0%</span></div>
                <div class="progress-bar"><div id="progress-bar" class="h-full bg-[#065fd4] w-0"></div></div>
            </div>
            <div class="flex justify-end gap-4 mt-6">
                <button onclick="hideVideoModal()" class="px-8 py-3 font-medium text-gray-600 dark:text-gray-400">Cancelar</button>
                <button onclick="hideVideoModal()" class="px-8 py-3 bg-[#065fd4] text-white rounded-3xl font-medium">Feito</button>
            </div>
        </div>
    </div>

    <!-- MENU USUÁRIO -->
    <div id="user-menu" onclick="if(event.target.id === 'user-menu') hideUserMenu()" class="hidden fixed inset-0 z-[6000] bg-black/30 flex items-start justify-end pt-16 pr-8">
        <div class="bg-white dark:bg-[#1a1a1a] rounded-3xl shadow-2xl py-3 w-64 text-sm">
            <div onclick="toggleDarkMode()" class="px-6 py-4 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer flex items-center gap-3">🌙 Modo Escuro</div>
            <div onclick="logout()" class="px-6 py-4 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer flex items-center gap-3">🚪 Sair da conta</div>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÃO FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAvZl2jk8i8n0e9844cxw6mGdCWXB6CZ_w",
            authDomain: "resp-f1.firebaseapp.com",
            projectId: "resp-f1",
            storageBucket: "resp-f1.firebasestorage.app",
            messagingSenderId: "616016136217",
            appId: "1:616016136217:web:ec3642b797375ce0134288"
        };

        let app, auth, db, storage;
        let currentUser = null;
        let currentNick = null;
        let customModules = [];
        let activeModule = 'inicio';

        const availableModulesList = [
            { id: 'videos', name: 'Vídeos', icon: '📹' },
            { id: 'chat', name: 'Chat Global', icon: '💬' },
            { id: 'mensagens', name: 'Mensagens', icon: '✉️' },
            { id: 'explorar', name: 'Explorar', icon: '🔎' }
        ];

        function initFirebase() {
            if (!app) {
                app = firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();
                storage = firebase.storage();
            }
        }

        // ==================== LOGIN ====================
        async function loginWithGoogle() {
            initFirebase();
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                handleAuthSuccess(result.user);
            } catch (e) { alert("Erro no Google: " + e.message); }
        }

        async function handleEmailLogin() {
            initFirebase();
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value;
            if (!email || !password) return alert("Preencha e-mail e senha");

            try {
                let result;
                try {
                    result = await auth.signInWithEmailAndPassword(email, password);
                } catch (err) {
                    if (err.code === 'auth/user-not-found') result = await auth.createUserWithEmailAndPassword(email, password);
                    else throw err;
                }
                handleAuthSuccess(result.user);
            } catch (e) { alert("Erro: " + e.message); }
        }

        function handleAuthSuccess(user) {
            currentUser = user;
            document.getElementById('login-screen').classList.add('hidden');
            checkProfileSetup();
        }

        async function checkProfileSetup() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists && doc.data().nick) {
                currentNick = doc.data().nick;
                enterMainApp();
            } else {
                document.getElementById('setup-screen').classList.remove('hidden');
            }
        }

        async function saveNickname() {
            const nick = document.getElementById('nickname-input').value.trim().toLowerCase();
            if (nick.length < 3) return alert("Nickname deve ter pelo menos 3 caracteres");
            const query = await db.collection('users').where('nick', '==', nick).get();
            if (!query.empty) return alert("Esse nickname já está em uso");
            
            await db.collection('users').doc(currentUser.uid).set({ nick, email: currentUser.email }, { merge: true });
            currentNick = nick;
            document.getElementById('setup-screen').classList.add('hidden');
            enterMainApp();
        }

        function enterMainApp() {
            document.getElementById('app-screen').classList.remove('hidden');
            document.getElementById('user-nick-sidebar').textContent = currentNick;
            document.getElementById('user-email-sidebar').textContent = currentUser.email;
            loadCustomModulesRealTime();
            renderMainContent('inicio');
        }

        // ==================== SIDEBAR ====================
        function loadCustomModulesRealTime() {
            db.collection('users').doc(currentUser.uid).onSnapshot(doc => {
                customModules = doc.exists ? (doc.data().customModules || []) : [];
                renderSidebar();
            });
        }

        function renderSidebar() {
            const container = document.getElementById('sidebar-modules');
            container.innerHTML = `
                <div onclick="switchToModule('inicio')" class="module-item flex items-center gap-4 px-5 py-4 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer ${activeModule === 'inicio' ? 'bg-gray-100 dark:bg-gray-700' : ''}">
                    <span class="text-2xl">🏠</span><span class="font-medium text-lg dark:text-white">Início</span>
                </div>`;
            
            customModules.forEach(id => {
                const mod = availableModulesList.find(m => m.id === id);
                if (!mod) return;
                const el = document.createElement('div');
                el.className = `module-item flex items-center gap-4 px-5 py-4 hover:bg-gray-100 dark:hover:bg-gray-700 cursor-pointer ${activeModule === id ? 'bg-gray-100 dark:bg-gray-700' : ''}`;
                el.innerHTML = `<span class="text-2xl">${mod.icon}</span><span class="font-medium text-lg dark:text-white">${mod.name}</span>`;
                el.onclick = () => switchToModule(id);
                container.appendChild(el);
            });
        }

        function toggleMobileSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }

        // ==================== NAVEGAÇÃO ====================
        function switchToModule(moduleId) {
            activeModule = moduleId;
            renderMainContent(moduleId);
            if (window.innerWidth <= 768) toggleMobileSidebar();
        }

        function renderMainContent(moduleId) {
            const area = document.getElementById('main-content-area');
            document.getElementById('current-page-title').textContent = moduleId === 'inicio' ? 'Início' : moduleId.charAt(0).toUpperCase() + moduleId.slice(1);

            area.innerHTML = '';

            if (moduleId === 'inicio') {
                area.innerHTML = `
                    <h2 class="text-4xl font-semibold mb-2 dark:text-white">Olá, <span class="text-[#065fd4]">${currentNick}</span>!</h2>
                    <p class="text-gray-500 dark:text-gray-400 mb-8">O que vamos fazer hoje?</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                        <div onclick="switchToModule('videos')" class="bg-white dark:bg-[#1a1a1a] rounded-3xl p-6 hover:shadow-xl cursor-pointer"><div class="text-4xl mb-4">📹</div><h3 class="font-semibold text-xl dark:text-white">Vídeos</h3></div>
                        <div onclick="switchToModule('chat')" class="bg-white dark:bg-[#1a1a1a] rounded-3xl p-6 hover:shadow-xl cursor-pointer"><div class="text-4xl mb-4">💬</div><h3 class="font-semibold text-xl dark:text-white">Chat Global</h3></div>
                        <div onclick="switchToModule('mensagens')" class="bg-white dark:bg-[#1a1a1a] rounded-3xl p-6 hover:shadow-xl cursor-pointer"><div class="text-4xl mb-4">✉️</div><h3 class="font-semibold text-xl dark:text-white">Mensagens</h3></div>
                    </div>`;
            } 
            else if (moduleId === 'chat') {
                renderChatGlobal();
            } 
            else if (moduleId === 'videos') {
                area.innerHTML = `
                    <div class="flex justify-between items-baseline mb-6">
                        <h2 class="text-3xl font-semibold dark:text-white">Vídeos da comunidade</h2>
                        <button onclick="showVideoUploadModal()" class="bg-[#065fd4] text-white px-6 py-3 rounded-3xl">Enviar Vídeo</button>
                    </div>
                    <div id="videos-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>`;
                // loadVideosRealTime(); // pode ser adicionado depois
            }
        }

        // ==================== CHAT GLOBAL ====================
        function renderChatGlobal() {
            const area = document.getElementById('main-content-area');
            area.innerHTML = `
                <div class="flex flex-col h-full">
                    <h2 class="text-3xl font-semibold mb-4 dark:text-white">Chat Global</h2>
                    <div id="chat-messages" class="chat-container bg-white dark:bg-[#1a1a1a] rounded-3xl p-6 flex-1 overflow-y-auto space-y-4"></div>
                    
                    <div class="mt-4 bg-white dark:bg-[#1a1a1a] p-4 rounded-3xl">
                        <div class="flex gap-3">
                            <input id="chat-text-input" type="text" placeholder="Digite sua mensagem..." class="flex-1 px-6 py-4 bg-gray-100 dark:bg-[#222] rounded-3xl outline-none dark:text-white">
                            <label class="cursor-pointer bg-gray-200 dark:bg-gray-700 w-12 h-12 rounded-3xl flex items-center justify-center text-2xl">📷
                                <input type="file" id="chat-image" accept="image/*" class="hidden" onchange="sendMedia('image')">
                            </label>
                            <label class="cursor-pointer bg-gray-200 dark:bg-gray-700 w-12 h-12 rounded-3xl flex items-center justify-center text-2xl">🎤
                                <input type="file" id="chat-audio" accept="audio/*" class="hidden" onchange="sendMedia('audio')">
                            </label>
                            <button onclick="sendTextMessage()" class="bg-[#065fd4] text-white w-12 h-12 rounded-3xl text-3xl">↑</button>
                        </div>
                    </div>
                </div>`;
            loadChatMessages();
        }

        function loadChatMessages() {
            const container = document.getElementById('chat-messages');
            db.collection('messages').orderBy('timestamp').onSnapshot(snapshot => {
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const m = doc.data();
                    const isMine = m.uid === currentUser.uid;
                    let html = `<div class="flex ${isMine ? 'justify-end' : 'justify-start'}"><div class="${isMine ? 'bg-[#065fd4] text-white' : 'bg-gray-200 dark:bg-gray-700 dark:text-white'} chat-bubble">`;
                    if (m.text) html += `<p>${m.text}</p>`;
                    if (m.imageUrl) html += `<img src="${m.imageUrl}" class="message-img">`;
                    if (m.audioUrl) html += `<audio controls class="mt-2 w-full"><source src="${m.audioUrl}"></audio>`;
                    html += `</div></div>`;
                    container.innerHTML += html;
                });
                container.scrollTop = container.scrollHeight;
            });
        }

        async function sendTextMessage() {
            const input = document.getElementById('chat-text-input');
            const text = input.value.trim();
            if (!text) return;
            await db.collection('messages').add({ uid: currentUser.uid, nick: currentNick, text, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            input.value = '';
        }

        async function sendMedia(type) {
            const id = type === 'image' ? 'chat-image' : 'chat-audio';
            const file = document.getElementById(id).files[0];
            if (!file) return;
            const folder = type === 'image' ? 'images' : 'audios';
            const ref = storage.ref(`${folder}/${currentUser.uid}/${Date.now()}_${file.name}`);
            const task = ref.put(file);
            task.on('state_changed', null, null, async () => {
                const url = await ref.getDownloadURL();
                await db.collection('messages').add({
                    uid: currentUser.uid,
                    nick: currentNick,
                    [type === 'image' ? 'imageUrl' : 'audioUrl']: url,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
            });
        }

        // ==================== OUTRAS FUNÇÕES ====================
        function toggleCustomizePanel() {
            document.getElementById('customize-panel').classList.toggle('hidden');
        }

        function showUserMenu() {
            document.getElementById('user-menu').classList.toggle('hidden');
        }

        function hideUserMenu() {
            document.getElementById('user-menu').classList.add('hidden');
        }

        function toggleDarkMode() {
            document.documentElement.classList.toggle('dark');
            hideUserMenu();
        }

        function logout() {
            auth.signOut();
            location.reload();
        }

        function showVideoUploadModal() {
            document.getElementById('video-upload-modal').classList.remove('hidden');
        }

        function hideVideoModal() {
            document.getElementById('video-upload-modal').classList.add('hidden');
        }

        function showNotifications() {
            alert("Notificações em breve");
        }

        // ==================== INICIALIZAÇÃO ====================
        function initializeRESP() {
            console.log('%c🚀 RESP V8.0 - Completo e Responsivo', 'background:#065fd4;color:white;padding:6px 10px;border-radius:8px');
            initFirebase();
        }

        window.onload = initializeRESP;
    </script>
</body>
</html>
