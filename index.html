<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESP – Rede Social Personalizável</title>
    <style>
        :root {
            --primary: #ff0000; /* Vermelho YouTube */
            --bg: #f9f9f9;
            --sidebar-bg: #ffffff;
            --text: #0f0f0f;
            --border: #e5e5e5;
            --accent: #f2f2f2;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; }

        body { background-color: var(--bg); color: var(--text); overflow-x: hidden; }

        header {
            height: 56px;
            background: white;
            display: flex;
            align-items: center;
            padding: 0 16px;
            position: fixed;
            width: 100%;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .menu-toggle { font-size: 20px; background: none; border: none; cursor: pointer; padding: 8px; }

        .sidebar {
            position: fixed;
            left: -240px;
            top: 0;
            width: 240px;
            height: 100%;
            background: var(--sidebar-bg);
            transition: 0.3s ease;
            z-index: 101;
            display: flex;
            flex-direction: column;
            padding: 12px;
            padding-top: 60px;
        }

        .sidebar.active { left: 0; }

        .module-list { flex-grow: 1; list-style: none; }
        .module-item {
            padding: 10px 12px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
        }
        .module-item:hover { background: var(--accent); }

        .config-btn {
            background: #000;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        /* --- PAINEL INFERIOR --- */
        .bottom-panel {
            position: fixed;
            bottom: 20px;
            left: 260px;
            right: 20px;
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .draggable-item {
            display: inline-block;
            padding: 8px 16px;
            background: var(--primary);
            color: white;
            border-radius: 6px;
            margin-right: 8px;
            cursor: grab;
        }

        /* --- CONTEÚDO PRINCIPAL --- */
        main { padding: 72px 24px; max-width: 1280px; margin: 0 auto; }

        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

        .btn-add { background: #065fd4; color: white; border: none; padding: 10px 18px; border-radius: 18px; cursor: pointer; font-weight: 500; }

        .video-form {
            background: white;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: none;
            flex-direction: column;
            gap: 12px;
            max-width: 600px;
        }

        .video-form input, .video-form textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }

        /* --- GRID ESTILO YOUTUBE --- */
        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

        .video-card { cursor: pointer; }
        .thumbnail { 
            width: 100%; 
            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 12px; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .thumbnail video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .video-info { margin-top: 12px; }
        .video-info h3 { font-size: 16px; margin-bottom: 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-info p { font-size: 14px; color: #606060; }

        /* --- PLAYER DE VÍDEO (ESTILO YOUTUBE) --- */
        .video-player-container { display: none; flex-direction: column; gap: 16px; }
        .main-video { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 12px; }
        .player-info h1 { font-size: 20px; margin-bottom: 8px; }
        .player-info p { background: var(--accent); padding: 12px; border-radius: 12px; font-size: 14px; }
        .btn-back { background: none; border: 1px solid #ccc; padding: 8px 16px; border-radius: 18px; cursor: pointer; margin-bottom: 16px; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 100; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <header>
        <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
        <h3 style="margin-left: 16px; font-weight: bold; letter-spacing: -1px;">RESP <span style="font-weight: normal; color: gray;">Vídeos</span></h3>
    </header>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <ul class="module-list" id="moduleList"></ul>
        <button class="config-btn" onclick="toggleBottomPanel()">☰☰ PERSONALIZAR</button>
    </aside>

    <main>
        <section id="listView">
            <div class="content-header">
                <h1 id="pageTitle">Início</h1>
                <button id="addVideoBtn" class="btn-add" style="display: none;" onclick="toggleVideoForm()">+ Adicionar Vídeo</button>
            </div>

            <div id="videoForm" class="video-form">
                <h3>Novo Vídeo</h3>
                <input type="text" id="videoTitle" placeholder="Título do vídeo">
                <textarea id="videoDesc" placeholder="Descrição"></textarea>
                <input type="file" id="videoFile" accept="video/*">
                <div style="display: flex; gap: 10px;">
                    <button class="btn-add" onclick="publishVideo()">Publicar</button>
                    <button class="btn-add" style="background:#eee; color:#000;" onclick="toggleVideoForm()">Cancelar</button>
                </div>
            </div>

            <div class="content-grid" id="grid"></div>
        </section>

        <section id="playerView" class="video-player-container">
            <button class="btn-back" onclick="closePlayer()">← Voltar</button>
            <video id="playerElement" class="main-video" controls autoplay></video>
            <div class="player-info">
                <h1 id="playerTitle">Título do Vídeo</h1>
                <p id="playerDesc">Descrição do vídeo aqui...</p>
            </div>
        </section>
    </main>

    <script>
        const sidebar = document.getElementById('sidebar');
        const moduleList = document.getElementById('moduleList');
        const grid = document.getElementById('grid');
        const pageTitle = document.getElementById('pageTitle');
        const addVideoBtn = document.getElementById('addVideoBtn');
        const videoForm = document.getElementById('videoForm');
        
        const listView = document.getElementById('listView');
        const playerView = document.getElementById('playerView');

        let bottomPanel = null;
        let activeModules = JSON.parse(localStorage.getItem('resp_modules')) || ['Início'];
        
        // Memória temporária para os Blobs de vídeo (evita estourar o LocalStorage)
        let videoStorage = [];

        // Inicialização
        function renderSidebar() {
            moduleList.innerHTML = '';
            activeModules.forEach(mod => {
                const li = document.createElement('li');
                li.className = 'module-item';
                li.innerText = mod;
                li.onclick = () => changeContent(mod);
                moduleList.appendChild(li);
            });
        }

        function toggleSidebar() {
            sidebar.classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleBottomPanel() {
            if (bottomPanel) { bottomPanel.remove(); bottomPanel = null; }
            else {
                bottomPanel = document.createElement('div');
                bottomPanel.className = 'bottom-panel';
                bottomPanel.innerHTML = `
                    <p style="margin-bottom:10px; font-size:12px; font-weight:bold;">ARRASTE PARA A BARRA LATERAL:</p>
                    <div class="draggable-item" draggable="true">Vídeos</div>
                    <div class="draggable-item" draggable="true">Comunidade</div>
                    <div class="draggable-item" draggable="true">Loja</div>
                `;
                document.body.appendChild(bottomPanel);
                bottomPanel.querySelectorAll('.draggable-item').forEach(item => {
                    item.ondragstart = (e) => e.dataTransfer.setData('text', e.target.innerText);
                });
            }
        }

        // Drop na Sidebar
        moduleList.ondragover = (e) => e.preventDefault();
        moduleList.ondrop = (e) => {
            const name = e.dataTransfer.getData('text');
            if (name && !activeModules.includes(name)) {
                activeModules.push(name);
                localStorage.setItem('resp_modules', JSON.stringify(activeModules));
                renderSidebar();
                changeContent(name);
            }
        };

        // Lógica de Vídeo
        function toggleVideoForm() { 
            videoForm.style.display = (videoForm.style.display === 'flex') ? 'none' : 'flex'; 
        }

        function publishVideo() {
            const file = document.getElementById('videoFile').files[0];
            if (!file) return alert("Selecione um vídeo!");

            const videoData = {
                id: Date.now(),
                title: document.getElementById('videoTitle').value || "Vídeo sem título",
                desc: document.getElementById('videoDesc').value || "Nenhuma descrição fornecida.",
                file: file // Guardamos o arquivo original
            };

            videoStorage.push(videoData);
            renderVideos();
            toggleVideoForm();
            
            // Limpar form
            document.getElementById('videoTitle').value = '';
            document.getElementById('videoDesc').value = '';
            document.getElementById('videoFile').value = '';
        }

        function renderVideos() {
            grid.innerHTML = '';
            videoStorage.forEach(vid => {
                const url = URL.createObjectURL(vid.file);
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => openPlayer(vid, url);
                card.innerHTML = `
                    <div class="thumbnail">
                        <video src="${url}#t=0.1"></video>
                    </div>
                    <div class="video-info">
                        <h3>${vid.title}</h3>
                        <p>RESP Vídeos • Postado agora</p>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- SISTEMA DE PLAYER ---
        function openPlayer(vid, url) {
            listView.style.display = 'none';
            playerView.style.display = 'flex';
            
            const player = document.getElementById('playerElement');
            player.src = url;
            document.getElementById('playerTitle').innerText = vid.title;
            document.getElementById('playerDesc').innerText = vid.desc;
            
            window.scrollTo(0,0);
        }

        function closePlayer() {
            const player = document.getElementById('playerElement');
            player.pause();
            player.src = "";
            playerView.style.display = 'none';
            listView.style.display = 'block';
        }

        function changeContent(name) {
            closePlayer();
            pageTitle.innerText = name;
            grid.innerHTML = '';
            addVideoBtn.style.display = (name === 'Vídeos') ? 'block' : 'none';
            
            if (name === 'Vídeos') {
                renderVideos();
            } else if (name === 'Início') {
                grid.innerHTML = '<p>Bem-vindo à RESP. Arraste módulos para personalizar seu feed!</p>';
            }
            
            if (window.innerWidth < 768) toggleSidebar();
        }

        renderSidebar();
        changeContent('Início');
    </script>
</body>
</html>
