<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESP – Sistema de Personalização</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

    <style>
        :root { --primary: #065fd4; --bg: #f9f9f9; --text: #0f0f0f; --border: #e5e5e5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); color: var(--text); }
        
        header { height: 56px; background: white; display: flex; align-items: center; padding: 0 16px; position: fixed; width: 100%; z-index: 100; border-bottom: 1px solid var(--border); }
        
        /* SIDEBAR */
        .sidebar { position: fixed; left: -260px; top: 0; width: 260px; height: 100%; background: white; transition: 0.3s; z-index: 101; padding: 80px 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        
        .module-list { flex-grow: 1; list-style: none; min-height: 100px; border: 2px dashed transparent; transition: 0.3s; }
        .module-list.drag-over { border-color: var(--primary); background: #f0f7ff; }
        
        .module-item { padding: 15px; border-radius: 10px; cursor: pointer; margin-bottom: 10px; background: #eee; font-weight: bold; text-align: center; }

        /* BARRA INFERIOR DE PERSONALIZAÇÃO */
        .bottom-panel { position: fixed; bottom: 0; left: 0; width: 100%; background: #ffd700; /* Amarelo para destacar */ padding: 25px; z-index: 2000; box-shadow: 0 -5px 15px rgba(0,0,0,0.2); display: none; justify-content: center; gap: 20px; align-items: center; }
        .draggable-item { padding: 12px 25px; background: #000; color: white; border-radius: 8px; cursor: grab; font-weight: bold; }

        /* CONTEÚDO PRINCIPAL */
        main { padding: 80px 20px; max-width: 1100px; margin: 0 auto; }
        .btn-add { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        
        .video-form { background: white; border: 1px solid var(--border); padding: 25px; border-radius: 15px; margin-bottom: 30px; display: none; flex-direction: column; gap: 12px; }
        .video-form input, .video-form textarea { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }

        .content-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .video-card { cursor: pointer; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .thumbnail { width: 100%; aspect-ratio: 16/9; background: #000; display: flex; align-items: center; justify-content: center; }
        .thumbnail video { width: 100%; height: 100%; object-fit: cover; }

        #playerView { display: none; flex-direction: column; gap: 20px; }
        .main-video { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 15px; }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 100; }
        .overlay.active { display: block; }
        
        .config-btn { background: #000; color: white; border: none; padding: 15px; border-radius: 10px; cursor: pointer; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <button onclick="toggleSidebar()" style="background:none; border:none; font-size:28px; cursor:pointer;">☰</button>
        <h2 style="margin-left:15px; letter-spacing: -1px;">RESP</h2>
    </header>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <aside class="sidebar" id="sidebar">
        <h3 style="margin-bottom: 20px;">Menu</h3>
        <ul class="module-list" id="moduleList">
            <li class="module-item" onclick="changeContent('Início')">Início</li>
        </ul>
        <button class="config-btn" onclick="toggleBottomPanel()">⚙️ PERSONALIZAR BARRA</button>
    </aside>

    <main>
        <div id="listView">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h1 id="pageTitle">Início</h1>
                <button id="addBtn" class="btn-add" style="display:none;" onclick="toggleForm()">+ Novo Vídeo</button>
            </div>

            <div id="videoForm" class="video-form">
                <h3>Publicar na Rede Global</h3>
                <input type="text" id="vTitle" placeholder="Título">
                <textarea id="vDesc" placeholder="Descrição"></textarea>
                <input type="file" id="vFile" accept="video/*">
                <button id="pubBtn" class="btn-add" style="margin-top:10px" onclick="uploadVideo()">🚀 Publicar Agora</button>
                <p id="upInfo" style="display:none; color: var(--primary);">Enviando... por favor, não feche a aba.</p>
            </div>

            <div class="content-grid" id="grid"></div>
        </div>

        <div id="playerView">
            <button onclick="closePlayer()" style="padding:10px 20px; cursor:pointer; border-radius:30px; border:1px solid #ccc;">← Voltar ao Feed</button>
            <video id="playerElement" class="main-video" controls autoplay></video>
            <h2 id="playerTitle"></h2>
            <p id="playerDesc" style="color:#606060;"></p>
        </div>
    </main>

    <div id="bottomPanel" class="bottom-panel">
        <span style="font-weight:bold;">Arraste para a Sidebar:</span>
        <div class="draggable-item" draggable="true" ondragstart="drag(event)">Vídeos</div>
        <div class="draggable-item" draggable="true" ondragstart="drag(event)">Chat</div>
        <div class="draggable-item" draggable="true" ondragstart="drag(event)">Loja</div>
        <button onclick="toggleBottomPanel()" style="margin-left:20px; cursor:pointer; padding:5px 10px;">Fechar [X]</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAvZl2jk8i8n0e9844cxw6mGdCWXB6CZ_w",
            authDomain: "resp-f1.firebaseapp.com",
            projectId: "resp-f1",
            storageBucket: "resp-f1.firebasestorage.app",
            messagingSenderId: "616016136217",
            appId: "1:616016136217:web:ec3642b797375ce0134288"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage();

        let activeModules = new Set(['Início']);

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function toggleBottomPanel() {
            const panel = document.getElementById('bottomPanel');
            panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        }

        // --- DRAG AND DROP ---
        function drag(e) { e.dataTransfer.setData("text", e.target.innerText); }

        const mList = document.getElementById('moduleList');
        mList.ondragover = (e) => { e.preventDefault(); mList.classList.add('drag-over'); };
        mList.ondragleave = () => mList.classList.remove('drag-over');
        mList.ondrop = (e) => {
            e.preventDefault();
            mList.classList.remove('drag-over');
            const name = e.dataTransfer.getData("text");
            if (name && !activeModules.has(name)) {
                activeModules.add(name);
                const li = document.createElement('li');
                li.className = 'module-item';
                li.innerText = name;
                li.onclick = () => changeContent(name);
                mList.appendChild(li);
                changeContent(name);
            }
        };

        // --- SISTEMA DE VÍDEOS ---
        function toggleForm() {
            const f = document.getElementById('videoForm');
            f.style.display = (f.style.display === 'flex') ? 'none' : 'flex';
        }

        async function uploadVideo() {
            const file = document.getElementById('vFile').files[0];
            if (!file) return alert("Selecione um vídeo!");
            
            document.getElementById('upInfo').style.display = 'block';
            document.getElementById('pubBtn').disabled = true;

            try {
                const ref = storage.ref('videos/' + Date.now() + "_" + file.name);
                await ref.put(file);
                const url = await ref.getDownloadURL();

                await db.collection("videos").add({
                    title: document.getElementById('vTitle').value || "Sem título",
                    desc: document.getElementById('vDesc').value || "",
                    url: url,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("Vídeo enviado com sucesso!");
                location.reload();
            } catch (err) {
                alert("Erro! Verifique se ativou o Storage no modo de teste.");
            }
        }

        function loadVideos() {
            const grid = document.getElementById('grid');
            grid.innerHTML = "Carregando...";
            db.collection("videos").orderBy("createdAt", "desc").onSnapshot(snap => {
                grid.innerHTML = "";
                snap.forEach(doc => {
                    const v = doc.data();
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    card.onclick = () => {
                        document.getElementById('listView').style.display = 'none';
                        document.getElementById('playerView').style.display = 'flex';
                        document.getElementById('playerElement').src = v.url;
                        document.getElementById('playerTitle').innerText = v.title;
                        document.getElementById('playerDesc').innerText = v.desc;
                    };
                    card.innerHTML = `<div class="thumbnail"><video src="${v.url}#t=0.5"></video></div>
                                      <div style="padding:15px;"><h3>${v.title}</h3></div>`;
                    grid.appendChild(card);
                });
            });
        }

        function closePlayer() {
            document.getElementById('playerElement').pause();
            document.getElementById('listView').style.display = 'block';
            document.getElementById('playerView').style.display = 'none';
        }

        function changeContent(name) {
            document.getElementById('pageTitle').innerText = name;
            document.getElementById('addBtn').style.display = (name === 'Vídeos') ? 'block' : 'none';
            document.getElementById('grid').innerHTML = "";
            if (name === 'Vídeos') loadVideos();
            else document.getElementById('grid').innerHTML = `<p>Aba ${name} aberta.</p>`;
            if (window.innerWidth < 768) toggleSidebar();
        }
    </script>
</body>
</html>
