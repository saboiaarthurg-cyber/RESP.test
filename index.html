<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RESP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* MENU */
#menuBtn {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 26px;
  cursor: pointer;
  z-index: 1000;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  left: -260px;
  top: 0;
  width: 260px;
  height: 100%;
  background: #111;
  color: white;
  transition: 0.3s;
  padding: 20px;
}

#sidebar.active {
  left: 0;
}

#closeBtn {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
}

/* BOTÃO ☰☰ */
#openModules {
  position: absolute;
  bottom: 20px;
  left: 20px;
  font-size: 20px;
  cursor: pointer;
  display: none;
}

#sidebar.active #openModules {
  display: block;
}

/* CONTEÚDO */
#main {
  padding: 80px 20px;
}

.card {
  height: 120px;
  background: #ddd;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* BARRA (QUANDO EXISTIR) */
.bottomPanel {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  height: 160px;
  background: #222;
  color: white;
  padding: 20px;
  display: flex;
  gap: 10px;
  z-index: 999;
}

.bottom-item {
  background: #444;
  padding: 10px;
  border-radius: 8px;
}
</style>
</head>

<body>

<div id="menuBtn">☰</div>

<div id="sidebar">
  <div id="closeBtn">✖</div>
  <h3>RESP</h3>

  <div id="openModules">☰☰</div>
</div>

<div id="main">
  <div class="card">Produto</div>
</div>

<script>
const sidebar = document.getElementById("sidebar");
let panel = null; // NÃO EXISTE no começo

menuBtn.onclick = () => {
  sidebar.classList.toggle("active");

  // FECHOU SIDEBAR → REMOVE A BARRA
  if (!sidebar.classList.contains("active")) {
    if (panel) {
      panel.remove();
      panel = null;
    }
  }
};

closeBtn.onclick = () => {
  sidebar.classList.remove("active");

  if (panel) {
    panel.remove();
    panel = null;
  }
};

// CRIAR BARRA DO ZERO
openModules.onclick = () => {

  // evita duplicar
  if (panel) return;

  panel = document.createElement("div");
  panel.className = "bottomPanel";

  panel.innerHTML = `
    <div class="bottom-item">Vídeos</div>
    <div class="bottom-item">Chat</div>
    <div class="bottom-item">Feed</div>
  `;

  document.body.appendChild(panel);
};
</script>

</body>
</html>
