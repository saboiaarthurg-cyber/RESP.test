<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>RESP</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  overflow-x: hidden;
}

/* MENU */
#menuBtn {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 26px;
  cursor: pointer;
  z-index: 1000;
}

/* SIDEBAR */
#sidebar {
  position: fixed;
  left: -260px;
  top: 0;
  width: 260px;
  height: 100%;
  background: #111;
  color: white;
  transition: 0.3s;
  padding: 20px;
  z-index: 999;
}

#sidebar.active {
  left: 0;
}

/* FECHAR */
#closeBtn {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
}

/* MÓDULOS */
.module {
  background: #333;
  padding: 12px;
  margin: 12px 0;
  cursor: pointer;
  border-radius: 8px;
}

/* BOTÃO ABRIR PAINEL */
#openModules {
  position: absolute;
  bottom: 20px;
  left: 20px;
  font-size: 20px;
  cursor: pointer;
}

/* CONTEÚDO */
#main {
  padding: 80px 20px;
}

.screen {
  display: none;
}

.screen.active {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 15px;
}

.card {
  height: 120px;
  background: #ddd;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
}

/* PAINEL INFERIOR (BASE) */
#bottomPanel {
  position: fixed;
  left: 0;
  right: 0;
  background: #222;
  color: white;
  display: flex;
  gap: 10px;
  transition: 0.3s;
  z-index: 998;
}

/* ITENS */
.bottom-item {
  background: #444;
  padding: 10px;
  cursor: grab;
  border-radius: 8px;
}

/* ===== MODO MOBILE ===== */
@media (max-width: 768px) {
  #bottomPanel {
    bottom: -140px;
    height: 160px;
    padding: 30px 10px 10px;
    border-top-left-radius: 20px;
    border-top-right-radius: 20px;
  }

  #bottomPanel.active {
    bottom: 0;
  }

  #bottomPanel::before {
    content: "";
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 50px;
    height: 5px;
    background: #888;
    border-radius: 10px;
  }
}

/* ===== MODO PC ===== */
@media (min-width: 769px) {
  #bottomPanel {
    bottom: 0; /* SEMPRE visível no PC */
    height: 60px;
    padding: 10px;
    justify-content: center;
    border-radius: 0;
  }

  #bottomPanel::before {
    display: none; /* sem puxador */
  }
}
</style>
</head>

<body>

<div id="menuBtn">☰</div>

<div id="sidebar">
  <div id="closeBtn">✖</div>

  <h3>RESP</h3>

  <div id="modulesList">
    <div class="module" onclick="openScreen('home')">Início</div>
  </div>

  <div id="openModules">☰☰</div>
</div>

<div id="main">
  <div id="home" class="screen active">
    <div class="card">Produto</div>
    <div class="card">Vídeo</div>
    <div class="card">Post</div>
    <div class="card">Produto</div>
  </div>

  <div id="Vídeos" class="screen"></div>
  <div id="Chat" class="screen"></div>
  <div id="Feed" class="screen"></div>
</div>

<!-- PAINEL -->
<div id="bottomPanel">
  <div class="bottom-item" draggable="true">Vídeos</div>
  <div class="bottom-item" draggable="true">Chat</div>
  <div class="bottom-item" draggable="true">Feed</div>
</div>

<script>
const sidebar = document.getElementById("sidebar");
const panel = document.getElementById("bottomPanel");
const modulesList = document.getElementById("modulesList");

// MENU
menuBtn.onclick = () => {
  sidebar.classList.toggle("active");
};

closeBtn.onclick = () => {
  sidebar.classList.remove("active");
};

// MOBILE: abrir painel
openModules.onclick = () => {
  if (window.innerWidth <= 768) {
    panel.classList.toggle("active");
  }
};

// DRAG
document.querySelectorAll('.bottom-item').forEach(item => {
  item.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text', item.innerText);
  });
});

// DROP
sidebar.addEventListener('dragover', e => e.preventDefault());

sidebar.addEventListener('drop', e => {
  const data = e.dataTransfer.getData('text');

  if ([...modulesList.children].some(el => el.innerText === data)) return;

  const newModule = document.createElement('div');
  newModule.className = 'module';
  newModule.innerText = data;
  newModule.onclick = () => openScreen(data);

  modulesList.appendChild(newModule);
});

// TROCAR TELA
function openScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

  const screen = document.getElementById(name);
  if (screen) {
    screen.classList.add('active');

    if (screen.innerHTML === "") {
      for (let i = 0; i < 6; i++) {
        let div = document.createElement("div");
        div.className = "card";
        div.innerText = name;
        screen.appendChild(div);
      }
    }
  }

  sidebar.classList.remove("active");
}
</script>

</body>
</html>
